          const matched = allEvents.filter(ev => matcher(ev.id));
          if (matched.length) {
            matched.forEach(ev => placed.add(ev.id));
            groups.push({ label, events: matched });
          }
        }
        const unmatched = allEvents.filter(ev => !placed.has(ev.id));
        if (unmatched.length) groups.push({ label: 'Other', events: unmatched });
      } else {
        const categoryOrder = ['movement', 'lifecycle', 'crud', 'config', 'import'];
        groups = categoryOrder
          .filter(cat => cov.categories[cat])
          .map(cat => ({
            label: cat.toUpperCase(),
            events: cov.categories[cat].events || [],
          }));
      }

      // Render table groups (for category/domain, or no standalone in chain view)
      const renderEventRow = (ev) => {
        const dotClass = ev.status === 'pass' ? 'dot-pass' : ev.status === 'fail' ? 'dot-fail' : 'dot-untested';
        const statusLabel = ev.status === 'untested' ? '—' : ev.status.toUpperCase();
        const scenarios = ev.scenarios ? `${ev.scenarios.passed || 0}/${ev.scenarios.total || 0}` : '—';
        const m = ev.manual || {};
        const manualCol = m.total > 0
          ? `${_manualIcon(m)} ${m.reviewed}/${m.total}`
          : '<span style="color:var(--text-muted)">—</span>';
        const lastRun = ev.last_run ? new Date(ev.last_run).toLocaleDateString('en-GB', {day:'numeric',month:'short'}) : '—';
        return `
          <tr class="qa-event-row" onclick="openEventOverlay('${ev.id}')">
            <td><span class="dot ${dotClass}"></span> ${statusLabel}</td>
            <td>${ev.name}</td>
            <td style="text-align:center">${scenarios}</td>
            <td style="text-align:center">${manualCol}</td>
            <td style="text-align:center">${lastRun}</td>
          </tr>
        `;
      };

      let categoriesHtml = '';
      for (const g of groups) {
        const covered = g.events.filter(ev => ev.status !== 'untested').length;
        categoriesHtml += `
          <div class="qa-table-zone">
            <div class="qa-table-zone-header">
              <span class="qa-table-zone-title">${g.label} (${g.events.length})</span>
              <span class="qa-table-zone-count">${covered}/${g.events.length} covered</span>
            </div>
            <table class="qa-event-table">
              <thead>
                <tr>
                  <th style="width:100px">Auto</th>
                  <th>Event</th>
                  <th style="width:80px;text-align:center">Scen.</th>
                  <th style="width:90px;text-align:center">Manual</th>
                  <th style="width:80px;text-align:center">Last Run</th>
                </tr>
              </thead>
              <tbody>${g.events.map(renderEventRow).join('')}</tbody>
            </table>
          </div>
        `;
      }

      return statCards + manualBar + metaBar + groupToggle + chainsHtml + categoriesHtml;
    }

    // ========================================================================
    // EVENT OVERLAY — Split-pane: Scenario list | Detail panel
    // ========================================================================

    function setQaZoom(level) {
      const overlay = document.getElementById('qa-event-overlay');
      if (overlay) {
        overlay.setAttribute('data-zoom', String(level));
        localStorage.setItem('qa-zoom', String(level));
        overlay.querySelectorAll('.qa-zoom-btn').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-zoom') === String(level));
        });
      }
    }

    async function openEventOverlay(eventId, initialTab) {
      const existing = document.getElementById('qa-event-overlay');
      if (existing) existing.remove();

      const savedZoom = localStorage.getItem('qa-zoom') || '1';

      // Create overlay shell
      const overlay = document.createElement('div');
      overlay.id = 'qa-event-overlay';
      overlay.className = 'qa-overlay open';
      overlay.setAttribute('data-zoom', savedZoom);
      overlay.innerHTML = `
        <div class="qa-overlay-top">
          <div class="qa-overlay-header">
            <div class="qa-overlay-title" id="qa-overlay-title-text">${eventId}</div>
            <div class="qa-overlay-controls">
              <span style="font-size:10px;color:var(--text-muted)">Zoom</span>
              <button class="qa-zoom-btn ${savedZoom==='1'?'active':''}" data-zoom="1" onclick="setQaZoom(1)" style="font-size:12px">A</button>
              <button class="qa-zoom-btn ${savedZoom==='2'?'active':''}" data-zoom="2" onclick="setQaZoom(2)" style="font-size:14px">A</button>
              <button class="qa-zoom-btn ${savedZoom==='3'?'active':''}" data-zoom="3" onclick="setQaZoom(3)" style="font-size:16px">A</button>
              <button class="qa-overlay-close" onclick="document.getElementById('qa-event-overlay').remove()">&#10005; Close</button>
            </div>
          </div>
        </div>
        <div class="qa-overlay-tabs" id="qa-overlay-tabs"></div>
        <div id="qa-overlay-summary"></div>
        <div id="qa-overlay-body" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">
          <div style="text-align:center;padding:40px;color:var(--text-tertiary)">Loading...</div>
        </div>
      `;
      document.body.appendChild(overlay);

      // Close on Escape
      const escHandler = (e) => {
        if (e.key === 'Escape') {
          const el = document.getElementById('qa-event-overlay');
          if (el) el.remove();
          document.removeEventListener('keydown', escHandler);
        }
      };
      document.addEventListener('keydown', escHandler);

      try {
        const resp = await fetch(`/api/qa/coverage/${eventId}?project=${encodeURIComponent(state.qaProject)}`);
        const data = await resp.json();

        window._overlayData = data;
        window._overlayEventId = eventId;

        // Update title
        const titleEl = document.getElementById('qa-overlay-title-text');
        if (titleEl) {
          const plan = data.plan;
          const status = plan?.results?.status;
          const statusIcon = status === 'pass' ? '<span style="color:var(--semantic-success)">&#10003;</span> ' : status === 'fail' ? '<span style="color:var(--semantic-error)">&#10007;</span> ' : '';
          const cat = plan?.scope?.category ? ` <span style="color:var(--text-muted);font-weight:400;font-size:14px">[${plan.scope.category}]</span>` : '';
          titleEl.innerHTML = `${statusIcon}${data.event.name || eventId}${cat}`;
        }

        renderOverlayTabs(initialTab || 'scenarios');
      } catch (e) {
        document.getElementById('qa-overlay-body').innerHTML = `<div style="color:var(--semantic-error);padding:24px">Failed to load: ${e.message}</div>`;
      }
    }

    function renderOverlayTabs(activeTab) {
      const data = window._overlayData;
      const eventId = window._overlayEventId;
      if (!data) return;

      window._overlayActiveTab = activeTab;

      // Render tab bar
      const tabsEl = document.getElementById('qa-overlay-tabs');
      const tabs = ['scenarios', 'scope', 'results'];
      tabsEl.innerHTML = tabs.map(t =>
        `<button class="qa-overlay-tab ${t === activeTab ? 'active' : ''}" onclick="renderOverlayTabs('${t}')">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`
      ).join('');

      // Render summary bar
      const summaryEl = document.getElementById('qa-overlay-summary');
      const plan = data.plan;
      const scenarios = plan?.matrix?.scenarios || [];
      const tested = scenarios.filter(s => s.status === 'pass' || s.status === 'fail').length;
      const passed = scenarios.filter(s => s.status === 'pass').length;
      const ms = data.manual_summary;

      summaryEl.innerHTML = `<div class="qa-overlay-summary">
        <span>Auto: <strong>${tested > 0 ? `${passed}/${tested} passed` : `${scenarios.length} planned`}</strong></span>
        ${ms ? `<span>Manual: <strong>${ms.reviewed}/${ms.total} reviewed</strong></span>` : ''}
        ${ms?.findings_count ? `<span style="color:var(--accent-secondary)">${ms.findings_count} findings</span>` : ''}
        <button class="edit-btn" onclick="openManualEditMode('${eventId}')">Edit</button>
      </div>`;

      // Render body
      const bodyEl = document.getElementById('qa-overlay-body');
      if (activeTab === 'scenarios') {
        bodyEl.innerHTML = renderOverlaySplitPane(data, eventId);
      } else if (activeTab === 'scope') {
        bodyEl.innerHTML = `<div class="qa-detail-area" style="overflow-y:auto;flex:1">${renderOverlayScope(data, eventId)}</div>`;
      } else {
        bodyEl.innerHTML = `<div class="qa-detail-area" style="overflow-y:auto;flex:1">${renderOverlayResults(data, eventId)}</div>`;
      }
    }

    // ---- SCENARIOS TAB: Split-pane ----

    function _msIcon(ms) {
      const map = {
        pass: '<span class="ms ms-pass" title="Manual: pass">&#10003;m</span>',
        fail: '<span class="ms ms-fail" title="Manual: fail">&#10007;m</span>',
        finding: '<span class="ms ms-finding" title="Manual: finding">!m</span>',
        skip: '<span class="ms ms-untested" title="Manual: skipped">&#8709;m</span>',
        'n/a': '<span class="ms" style="color:var(--text-muted)">n/a</span>',
      };
      return map[ms] || '<span class="ms ms-untested">&mdash;</span>';
    }

    function renderOverlaySplitPane(data, eventId) {
      const plan = data.plan;
      if (!plan?.matrix?.scenarios) {
        return '<div style="padding:24px;color:var(--text-tertiary)">No verify-plan data. Run <code>/verify</code> to populate.</div>';
      }

      const scenarios = plan.matrix.scenarios;
      const positive = scenarios.filter(s => !s.tag);
      const negative = scenarios.filter(s => s.tag === 'expected_fail' || s.tag === 'api_only');
      const uiChecks = scenarios.filter(s => s.tag === 'ui_check');

      // Store for detail rendering
      window._overlayScenarios = {};
      scenarios.forEach(s => { window._overlayScenarios[s.id] = s; });

      // Build scenario list (left pane)
      const renderListItem = (s) => {
        const autoIcon = s.status === 'pass' ? '<span class="ms ms-pass">&#10003;</span>'
          : s.status === 'fail' ? '<span class="ms ms-fail">&#10007;</span>'
          : '<span class="ms ms-untested">&#9675;</span>';
        const mIcon = _msIcon(s.manual_status);
        const isNa = s.tag === 'api_only' || s.tag === 'expected_fail';
        return `<div class="qa-scenario-list-item ${isNa ? 'na' : ''}" data-scenario="${s.id}" onclick="selectOverlayScenario('${s.id}')">
          <div class="qa-list-item-icons">${autoIcon} ${mIcon}</div>
          <span class="qa-list-item-id">${s.id}</span>
          <span class="qa-list-item-name">${s.name}</span>
        </div>`;
      };

      let listHtml = '';
      if (positive.length) {
        listHtml += `<div class="qa-list-group-header">Positive (${positive.length})</div>`;
        listHtml += positive.map(renderListItem).join('');
      }
      if (negative.length) {
        listHtml += `<div class="qa-list-group-header negative">Negative (${negative.length})</div>`;
        listHtml += negative.map(renderListItem).join('');
      }
      if (uiChecks.length) {
        listHtml += `<div class="qa-list-group-header ui-checks">UI Checks (${uiChecks.length})</div>`;
        listHtml += uiChecks.map(renderListItem).join('');
      }

      // Default: select first scenario
      const firstId = scenarios[0]?.id;

      return `<div class="qa-split-pane">
        <div class="qa-scenario-list">${listHtml}</div>
        <div class="qa-detail-area" id="qa-detail-area">
          <div class="qa-detail-empty">Select a scenario</div>
        </div>
      </div>`;
    }

    function selectOverlayScenario(id) {
      // Highlight in list
      document.querySelectorAll('.qa-scenario-list-item').forEach(el => {
        el.classList.toggle('selected', el.getAttribute('data-scenario') === id);
      });

      const s = window._overlayScenarios?.[id];
      if (!s) return;
      const detailArea = document.getElementById('qa-detail-area');
      if (!detailArea) return;

      window._overlaySelectedScenario = id;

      const autoIcon = s.status === 'pass' ? '<span class="ms ms-pass" style="font-size:18px">&#10003;</span>'
        : s.status === 'fail' ? '<span class="ms ms-fail" style="font-size:18px">&#10007;</span>'
        : '<span class="ms ms-untested" style="font-size:18px">&#9675;</span>';

      const tagClass = s.status === 'pass' ? 'tag-pass' : s.status === 'fail' ? 'tag-fail' : 'tag-untested';
      const tagLabel = s.status === 'pass' ? 'PASS' : s.status === 'fail' ? 'FAIL' : 'UNTESTED';

      const isNa = s.tag === 'api_only' || s.tag === 'expected_fail';
      const editing = window._overlayEditMode === true;

      // Get current edit state for this scenario (if editing)
      const es = editing ? (window._mqaEdit?.[id] || {}) : {};
      const currentMs = editing ? (es.manual_status || 'untested') : (s.manual_status || 'untested');
      const currentNotes = editing ? (es.notes || '') : (s.manual_notes || '');
      const currentFindings = editing ? (es.findings || []) : (s.manual_findings || []);
      const manualStatusText = isNa ? 'n/a' : currentMs === 'untested' ? 'not reviewed' : currentMs;

      // Assertions
      let assertionsHtml = '';
      const assertionEntries = Object.entries(s.assertions || {});
      if (assertionEntries.length) {
        assertionsHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label">Assertions (${assertionEntries.length})</div>
          <div class="qa-detail-assertions">
            ${assertionEntries.map(([viewer, a]) =>
              `<div class="qa-detail-assertion-row">
                <span class="viewer">${viewer}</span>
                <span>${(a.checks || []).join(', ')}${a.expanded ? ' [expand]' : ''}</span>
              </div>`
            ).join('')}
          </div>
        </div>`;
      } else {
        assertionsHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label">Assertions</div>
          <div class="qa-detail-notes">${isNa ? `N/A — ${s.tag} scenario` : 'No automated assertions defined'}</div>
        </div>`;
      }

      // Manual review section — view mode vs edit mode
      let manualHtml = '';
      if (isNa) {
        manualHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label">Manual Review</div>
          <div class="qa-detail-notes">N/A — ${s.tag} scenario</div>
        </div>`;
      } else if (editing) {
        // EDIT MODE: inline status buttons + notes + findings
        const esc = (str) => (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const btnClass = (status) => `qa-edit-btn${currentMs === status ? ` active-${status}` : ''}`;

        let findingsHtml = '';
        if (currentMs === 'finding' || currentFindings.length > 0) {
          findingsHtml = currentFindings.map((f, fi) => `
            <div class="qa-finding-form" style="margin-bottom:6px">
              <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">
                <input type="text" placeholder="Finding title" value="${esc(f.title)}" oninput="window._mqaEdit['${id}'].findings[${fi}].title=this.value" onclick="event.stopPropagation()" style="flex:1">
                <select onchange="window._mqaEdit['${id}'].findings[${fi}].severity=this.value" onclick="event.stopPropagation()">
                  <option value="low" ${f.severity === 'low' ? 'selected' : ''}>Low</option>
                  <option value="medium" ${f.severity === 'medium' ? 'selected' : ''}>Medium</option>
                  <option value="high" ${f.severity === 'high' ? 'selected' : ''}>High</option>
                </select>
              </div>
              <div style="display:flex;gap:6px;margin-bottom:4px">
                <input type="text" placeholder="Expected behavior" value="${esc(f.expected)}" oninput="window._mqaEdit['${id}'].findings[${fi}].expected=this.value" onclick="event.stopPropagation()" style="flex:1">
                <input type="text" placeholder="Actual behavior" value="${esc(f.actual)}" oninput="window._mqaEdit['${id}'].findings[${fi}].actual=this.value" onclick="event.stopPropagation()" style="flex:1">
              </div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <input type="text" placeholder="Pipeline ref (#113c)" value="${esc(f.pipeline_ref)}" oninput="window._mqaEdit['${id}'].findings[${fi}].pipeline_ref=this.value" onclick="event.stopPropagation()" style="width:140px">
                <label class="qa-snip-btn" title="Browse files" style="cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><input type="file" accept="image/*" style="display:none" onchange="uploadFindingScreenshot('${id}',${fi},this.files[0])"></label>
                <button class="qa-snip-btn" title="Snip screen" onclick="launchSnipAndPaste('${id}',${fi})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg></button>
                <button class="qa-snip-btn" title="Paste from clipboard" onclick="pasteFromClipboard('${id}',${fi})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></button>
                <button class="qa-snip-btn" title="Recent screenshots" onclick="loadRecentScreenshots('${id}',${fi})" style="border-color:var(--text-muted);color:var(--text-muted)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></button>
                <button onclick="removeFinding('${id}',${fi})" class="qa-snip-btn" title="Remove finding" style="margin-left:auto;border-color:var(--semantic-error);color:var(--semantic-error)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              </div>
              ${(f.screenshots || []).length ? `<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${(f.screenshots || []).map((ss, si) => `<div style="position:relative;display:inline-block"><img src="/api/qa/manual/screenshot/${encodeURIComponent(state.qaProject)}/${encodeURIComponent(ss)}" title="${ss}" style="height:48px;border-radius:4px;border:1px solid var(--border-subtle);object-fit:cover;object-position:top;cursor:pointer" onclick="expandScreengrab(this.src,'${ss.replace(/'/g,"\\'")}')"/><button onclick="removeScreenshot('${id}',${fi},${si})" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--semantic-error);color:#fff;border:none;cursor:pointer;font-size:10px;line-height:16px;padding:0" title="Remove">&#10005;</button></div>`).join('')}</div>` : ''}
              <div id="recent-strip-${id}-${fi}" class="qa-screenshot-strip" style="display:none"></div>
            </div>
          `).join('');
          findingsHtml += `<button onclick="addFinding('${id}')" style="padding:4px 12px;font-size:12px;border-radius:4px;border:1px dashed var(--accent-secondary);cursor:pointer;color:var(--accent-secondary);background:none;margin-top:4px">+ Add Finding</button>`;
        }

        manualHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label">Manual Review</div>
          <div class="qa-edit-buttons" id="mqa-buttons-${id}">
            <button class="${btnClass('pass')}" data-mqa-btn="${id}" data-status="pass" onclick="setManualStatus('${id}','pass')">&#10003; Pass</button>
            <button class="${btnClass('fail')}" data-mqa-btn="${id}" data-status="fail" onclick="setManualStatus('${id}','fail')">&#10007; Fail</button>
            <button class="${btnClass('finding')}" data-mqa-btn="${id}" data-status="finding" onclick="setManualStatus('${id}','finding')">! Finding</button>
            <button class="${btnClass('skip')}" data-mqa-btn="${id}" data-status="skip" onclick="setManualStatus('${id}','skip')">&#8709; Skip</button>
          </div>
          <textarea class="qa-edit-notes" placeholder="Notes..." id="mqa-notes-${id}" oninput="window._mqaEdit['${id}'].notes=this.value" onclick="event.stopPropagation()" rows="2">${esc(currentNotes)}</textarea>
          ${findingsHtml}
        </div>`;
      } else {
        // VIEW MODE
        if (currentMs && currentMs !== 'untested') {
          const msIcon = _msIcon(currentMs);
          manualHtml = `<div class="qa-detail-section">
            <div class="qa-detail-section-label">Manual Review</div>
            <div class="qa-detail-manual">
              <div class="qa-detail-manual-status">${msIcon} Reviewed — ${currentMs}</div>
              ${currentNotes ? `"${currentNotes}"` : ''}
            </div>
          </div>`;
        } else {
          manualHtml = `<div class="qa-detail-section">
            <div class="qa-detail-section-label">Manual Review</div>
            <div class="qa-detail-notes">Not yet reviewed</div>
          </div>`;
        }
      }

      // Findings (view mode only — edit mode shows them inline above)
      let findingsViewHtml = '';
      if (!editing && currentFindings.length) {
        findingsViewHtml = currentFindings.map(f => {
          const hasDetail = f.expected || f.actual || f.pipeline_ref;
          const hasImages = f.screenshots?.length > 0;
          return `<div class="qa-detail-section">
            <div class="qa-detail-section-label">Finding</div>
            <div class="qa-detail-finding">
              <span class="qa-detail-finding-severity">${(f.severity || 'med').toUpperCase()}</span>
              ${f.title || f.id}
              ${hasDetail ? `
                <div style="margin-top:8px;font-weight:400;font-size:12px;color:var(--text-secondary)">
                  ${f.expected ? `<div><span style="color:var(--text-tertiary)">Expected:</span> ${f.expected}</div>` : ''}
                  ${f.actual ? `<div><span style="color:var(--text-tertiary)">Actual:</span> ${f.actual}</div>` : ''}
                  ${f.pipeline_ref ? `<div><span style="color:var(--text-tertiary)">Pipeline:</span> <span style="color:var(--accent-primary)">${f.pipeline_ref}</span></div>` : ''}
                </div>
              ` : ''}
              ${hasImages ? `
                <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
                  ${f.screenshots.map(ss => `<img src="/api/qa/manual/screenshot/${encodeURIComponent(state.qaProject)}/${encodeURIComponent(ss)}" title="${ss}" style="height:56px;border-radius:4px;border:1px solid var(--border-subtle);object-fit:cover;object-position:top;cursor:pointer" onclick="expandScreengrab(this.src,'${ss.replace(/'/g,"\\'")}')"/>`).join('')}
                </div>
              ` : ''}
            </div>
          </div>`;
        }).join('');
      }

      // Screenshots: scenario-specific if available, else read chain fallback
      let screenshotsHtml = '';
      const scenarioScreenshots = s.manual_screenshots || [];
      const readChain = window._overlayData?.plan?.scope?.read_chain;
      const proj = encodeURIComponent(state.qaProject);
      const _cb = Date.now();
      const eventId = window._overlayEventId;

      if (scenarioScreenshots.length) {
        // Show scenario-specific screenshots
        const thumbs = scenarioScreenshots.map(filename => {
          const src = `/api/qa/scenario/screenshot/${proj}/${encodeURIComponent(eventId)}/${encodeURIComponent(filename)}?v=${_cb}`;
          return `<div style="display:inline-block;text-align:center;position:relative">
            <img src="${src}" style="height:72px;border-radius:4px;border:1px solid var(--accent-primary);object-fit:cover;object-position:top;display:block;cursor:pointer" onclick="expandScreengrab('${src}', '${filename}')" title="${filename}">
            <button onclick="event.stopPropagation();deleteScenarioScreenshot('${id}','${filename.replace(/'/g, "\\'")}')" style="position:absolute;top:-4px;right:-4px;background:var(--semantic-error);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:16px;padding:0" title="Remove">&#10005;</button>
          </div>`;
        }).join('');
        screenshotsHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label">Scenario Screenshots (${scenarioScreenshots.length})</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">${thumbs}</div>
        </div>`;
      } else if (readChain?.length) {
        // Fallback: show read chain viewer screenshots
        const thumbs = readChain.map(r => {
          const imgBase = `/api/qa/screenshots/${proj}/current/${r.viewer}.png?v=${_cb}`;
          const imgExp = r.has_expand ? `/api/qa/screenshots/${proj}/current/${r.viewer}_expanded.png?v=${_cb}` : null;
          return `<div style="display:inline-block;text-align:center;cursor:pointer" onclick="expandScreengrab('${imgBase}', '${r.viewer}')">
            <img src="${imgBase}" style="height:72px;border-radius:4px;border:1px solid var(--border-subtle);object-fit:cover;object-position:top;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='none'" title="${r.viewer}: ${r.description || ''}">
            <div style="font-size:10px;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono)">${r.viewer}</div>
            ${imgExp ? `<div style="font-size:9px;margin-top:1px"><a href="#" onclick="event.preventDefault();event.stopPropagation();expandScreengrab('${imgExp}', '${r.viewer} expanded')" style="color:var(--text-muted);text-decoration:none">+ expanded</a></div>` : ''}
          </div>`;
        }).join('');
        screenshotsHtml = `<div class="qa-detail-section">
          <div class="qa-detail-section-label" style="color:var(--text-muted)">Relevant Screenshots (${readChain.length}) <span style="font-size:10px;font-weight:400">— from read chain</span></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">${thumbs}</div>
        </div>`;
      }

      // Capture buttons — always shown so user can add scenario-specific screenshots
      const captureHtml = `<div class="qa-detail-section">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text-muted)">Capture:</span>
          <label class="qa-snip-btn" title="Browse files" style="cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><input type="file" accept="image/*" style="display:none" onchange="uploadScenarioScreenshot('${id}',this.files[0])"></label>
          <button class="qa-snip-btn" title="Snip screen" onclick="scenarioSnipAndPaste('${id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg></button>
          <button class="qa-snip-btn" title="Paste from clipboard" onclick="scenarioPasteFromClipboard('${id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></button>
          <button class="qa-snip-btn" title="Recent screenshots" onclick="scenarioLoadRecent('${id}')" style="border-color:var(--text-muted);color:var(--text-muted)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></button>
        </div>
        <div id="recent-strip-scenario-${id}" class="qa-screenshot-strip" style="display:none"></div>
      </div>`;

      detailArea.innerHTML = `
        <div class="qa-detail-title">${autoIcon} ${s.id} — ${s.name}</div>
        <div class="qa-detail-meta">
          <span class="tag ${tagClass}">${tagLabel}</span>
          <span>Auto: ${s.status || '—'}</span>
          <span>&middot;</span>
          <span>Manual: ${manualStatusText}</span>
        </div>
        ${assertionsHtml}
        ${screenshotsHtml}
        ${captureHtml}
        ${manualHtml}
        ${findingsViewHtml}
      `;
    }

    // Auto-select first scenario after split-pane renders
    const _autoSelectObserver = new MutationObserver(() => {
      const list = document.querySelector('.qa-scenario-list');
      if (list && !document.querySelector('.qa-scenario-list-item.selected')) {
        const first = list.querySelector('.qa-scenario-list-item');
        if (first) {
          const id = first.getAttribute('data-scenario');
          if (id) selectOverlayScenario(id);
        }
      }
    });
    _autoSelectObserver.observe(document.body, { childList: true, subtree: true });

    // ---- SCOPE TAB ----

    function renderOverlayScope(data, eventId) {
      const plan = data.plan;
      if (!plan?.scope) {
        return '<div style="padding:24px;color:var(--text-tertiary)">No verify-plan data. Run <code>/verify</code> to populate.</div>';
      }
      const s = plan.scope;
      let html = '';

      // Trigger
      html += `<div class="qa-scope-section">
        <div class="qa-scope-label">Trigger</div>
        <div class="qa-scope-text">${s.trigger}</div>
      </div>`;

      // Write chain
      if (s.write_chain?.length) {
        html += `<div class="qa-scope-section">
          <div class="qa-scope-label">Write Chain (${s.write_chain.length})</div>
          <table class="qa-scope-table">
            ${s.write_chain.map(w => `
              <tr>
                <td class="col-module">${w.module}</td>
                <td class="col-arrow">&#8594;</td>
                <td class="col-target">${w.table || 'API'}</td>
                <td class="col-op">${w.operation}</td>
              </tr>
            `).join('')}
          </table>
        </div>`;
      }

      // Read chain with screenshots
      if (s.read_chain?.length) {
        html += `<div class="qa-scope-section">
          <div class="qa-scope-label">Read Chain &mdash; Verified Viewers (${s.read_chain.length})</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:8px">`;
        for (const r of s.read_chain) {
          const proj = encodeURIComponent(state.qaProject);
          const _cb = Date.now();
          const imgBase = `/api/qa/screenshots/${proj}/current/${r.viewer}.png?v=${_cb}`;
          const imgExpanded = r.has_expand ? `/api/qa/screenshots/${proj}/current/${r.viewer}_expanded.png?v=${_cb}` : null;
          html += `<div style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;transition:all 0.15s">
            <div style="position:relative;background:var(--bg-raised);cursor:pointer" onclick="expandScreengrab('${imgBase}', '${r.viewer}')">
              <img src="${imgBase}" style="width:100%;height:100px;object-fit:cover;object-position:top;display:block" onerror="this.parentElement.innerHTML='<div style=\\'height:100px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px\\'>No screenshot</div>'">
              ${imgExpanded ? `<div style="position:absolute;top:4px;right:4px;background:var(--bg-base);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--text-muted);border:1px solid var(--border-subtle)" onclick="event.stopPropagation();expandScreengrab('${imgExpanded}', '${r.viewer} expanded')">+ expanded</div>` : ''}
            </div>
            <div style="padding:10px 12px">
              <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--accent-primary);margin-bottom:2px">${r.viewer}</div>
              <div style="font-size:12px;color:var(--text-secondary);line-height:1.4">${r.description}</div>
            </div>
          </div>`;
        }
        html += '</div></div>';
      }

      // Contract gaps — collapsible
      if (s.api_contract?.gaps?.length) {
        html += `<div class="qa-scope-section">
          <details class="qa-collapsible" open>
            <summary>Contract Gaps (${s.api_contract.gaps.length}) <span style="color:var(--accent-secondary)">&#9888;</span></summary>
            <div style="padding:8px 0">
              ${s.api_contract.gaps.map(g => {
                // Prefer typed {field, issue} objects from /verify
                const field = typeof g === 'object' ? g.field : null;
                const issue = typeof g === 'object' ? g.issue : null;
                // Fallback: parse "field_name: description" or "field_name — description"
                const match = !field && typeof g === 'string' ? g.match(/^([a-z_]+(?:\.[a-z_]+)*)[\s]*[:—\-–]\s*(.+)$/i) : null;
                const displayField = field || (match && match[1]);
                const displayIssue = issue || (match && match[2]);
                if (displayField && displayIssue) {
                  return `<div style="display:flex;gap:12px;padding:4px 0;border-bottom:1px solid var(--border-subtle);font-size:13px;line-height:1.5">
                    <span style="color:var(--accent-secondary);font-family:var(--font-mono);font-weight:600;font-size:12px;min-width:120px;flex-shrink:0">${displayField}</span>
                    <span style="color:var(--text-secondary)">${displayIssue}</span>
                  </div>`;
                }
                return `<div style="color:var(--text-secondary);font-size:13px;padding:4px 0;border-bottom:1px solid var(--border-subtle);line-height:1.5">&#8226; ${typeof g === 'string' ? g : JSON.stringify(g)}</div>`;
              }).join('')}
            </div>
          </details>
        </div>`;
      }

      // Propagation diagram — collapsible + enlargeable
      if (s.propagation?.length) {
        const propText = s.propagation.join('\n');
        html += `<div class="qa-scope-section">
          <details class="qa-collapsible" open>
            <summary style="display:flex;align-items:center;gap:8px">
              Propagation Diagram
              <button onclick="event.stopPropagation();expandPropagation()" class="qa-snip-btn" style="font-size:10px;padding:2px 8px" title="Enlarge">&#8599; Enlarge</button>
            </summary>
            <pre class="qa-propagation-pre" id="qa-propagation-content">${propText}</pre>
          </details>
        </div>`;
      }

      return html;
    }

    // ---- RESULTS TAB ----

    function renderOverlayResults(data, eventId) {
      const plan = data.plan;
      let html = '';

      // Self-check
      if (plan?.spec?.self_check) {
        const sc = plan.spec.self_check;
        const ok = sc.complete;
        html += `<div class="qa-scope-section">
          <div class="qa-scope-label" style="color:${ok ? 'var(--semantic-success)' : 'var(--semantic-error)'}">
            Self-Check: ${sc.viewers_covered}/${sc.viewers_planned} viewers ${ok ? '&#10003;' : '&#10007;'}
          </div>
          ${sc.detail ? `<div style="font-size:13px;color:var(--text-secondary);line-height:1.5">${sc.detail}</div>` : ''}
          ${sc.gaps?.length ? `<div style="color:var(--semantic-error);font-size:13px;margin-top:4px">Gaps: ${sc.gaps.join(', ')}</div>` : ''}
        </div>`;
      }

      // Run results
      const scenarioResults = plan?.results?.scenarios || data.results || [];
      if (scenarioResults.length) {
        const runTime = plan?.results?.run_time ? new Date(plan.results.run_time).toLocaleDateString('en-GB', {day:'numeric',month:'short'}) : '';
        const duration = plan?.results?.duration_ms ? `${(plan.results.duration_ms / 1000).toFixed(1)}s` : '';
        html += `<div class="qa-scope-section">
          <div class="qa-scope-label">Run Results ${runTime ? `<span style="font-weight:400;text-transform:none;letter-spacing:0">&mdash; ${runTime}${duration ? ` &middot; ${duration}` : ''}</span>` : ''}</div>
          ${scenarioResults.map(r => {
            const icon = r.status === 'pass' ? '&#10003;' : r.status === 'fail' ? '&#10007;' : '&#9675;';
            const cls = r.status === 'pass' ? 'qa-result-pass' : r.status === 'fail' ? 'qa-result-fail' : '';
            const dur = r.duration_ms ? `${(r.duration_ms / 1000).toFixed(1)}s` : '';
            const err = r.error ? `<span style="color:var(--semantic-error);font-size:12px"> &larr; ${r.error}</span>` : '';
            return `<div class="qa-result-row">
              <span class="qa-result-icon ${cls}">${icon}</span>
              <span class="qa-result-name">${r.name || r.id}</span>
              ${dur ? `<span class="qa-result-duration">${dur}</span>` : ''}
              ${err}
            </div>`;
          }).join('')}
        </div>`;
      }

      // All findings — automated + manual merged
      const autoFindings = (plan?.results?.findings || data.findings || []).map(f => ({...f, _source: 'auto'}));
      const manualFindings = [];
      // Collect manual findings from scenarios
      const scenarios = plan?.matrix?.scenarios || [];
      for (const s of scenarios) {
        for (const f of (s.manual_findings || [])) {
          manualFindings.push({...f, _source: 'manual', scenario: s.id});
        }
      }
      const allFindings = [...autoFindings, ...manualFindings];

      if (allFindings.length) {
        html += `<div class="qa-scope-section">
          <div class="qa-scope-label" style="color:var(--accent-terra)">Findings (${allFindings.length})</div>
          ${allFindings.map(f => {
            const sourceTag = f._source === 'manual'
              ? '<span class="qa-finding-source-tag qa-finding-source-manual">manual</span>'
              : '<span class="qa-finding-source-tag qa-finding-source-auto">auto</span>';
            return `<div class="qa-finding-card">
              <div class="qa-finding-card-title">
                ${f.id} (${f.severity}) &mdash; ${f.title} ${sourceTag}
                ${f.scenario ? `<span style="color:var(--text-muted);font-size:12px">[${f.scenario}]</span>` : ''}
              </div>
              <div class="qa-finding-card-detail">
                ${f.expected ? `<div>Expected: ${f.expected}</div>` : ''}
                ${f.actual ? `<div>Actual: ${f.actual}</div>` : ''}
                ${f.pipeline_ref ? `<div>Pipeline: <span style="color:var(--accent-camel)">${f.pipeline_ref}</span></div>` : ''}
                ${f.screenshots?.length ? `<div>Evidence: ${f.screenshots.length} screenshot(s) &#128247;</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>`;
      } else {
        html += `<div class="qa-scope-section"><div style="color:var(--text-tertiary);font-size:13px">No findings recorded.</div></div>`;
      }

      // Spec file
      if (plan?.spec?.file) {
        html += `<div style="font-size:12px;color:var(--text-muted);margin-top:12px;font-family:var(--font-mono)">${plan.spec.file}</div>`;
      }

      return html;
    }

    // ========================================================================
    // MANUAL QA — INLINE EDIT MODE
    // Edit controls appear directly in the split-pane detail panel.
    // Toggle edit mode → summary bar changes → detail panel shows buttons/notes.
    // ========================================================================

    async function openManualEditMode(eventId) {
      const data = window._overlayData;
      const manualResp = await fetch(`/api/qa/manual?project=${encodeURIComponent(state.qaProject)}`);
      const manualData = await manualResp.json();
      const eventManual = manualData.events?.[eventId]?.scenarios || {};

      const plan = data?.plan;
      const scenarios = plan?.matrix?.scenarios || [];

      // Build edit state for all scenarios
      const editState = {};
      for (const s of scenarios) {
        const existing = eventManual[s.id] || {};
        editState[s.id] = {
          manual_status: existing.manual_status || s.manual_status || 'untested',
          notes: existing.notes || s.manual_notes || '',
          findings: JSON.parse(JSON.stringify(existing.findings || s.manual_findings || [])),
          tag: s.tag || null,
        };
      }

      window._mqaEdit = editState;
      window._mqaEventId = eventId;
      window._overlayEditMode = true;

      // Update summary bar to show Save/Cancel
      const summaryEl = document.getElementById('qa-overlay-summary');
      if (summaryEl) {
        summaryEl.innerHTML = `<div class="qa-overlay-summary">
          <span style="font-weight:600;color:var(--accent-primary)">Editing: ${eventId}</span>
          <span style="font-size:12px;color:var(--text-muted)">Click scenarios on the left to review each one</span>
          <div style="margin-left:auto;display:flex;gap:8px">
            <button onclick="saveManualQa()" class="qa-edit-btn active-pass" style="font-weight:600;padding:5px 18px">Save</button>
            <button onclick="cancelEditMode()" class="qa-edit-btn" style="padding:5px 18px">Cancel</button>
          </div>
        </div>`;
      }

      // Re-render currently selected scenario with edit controls
      const selected = window._overlaySelectedScenario;
      if (selected) selectOverlayScenario(selected);
    }

    function cancelEditMode() {
      window._overlayEditMode = false;
      window._mqaEdit = null;
      const eventId = window._overlayEventId;
      // Restore summary bar
      renderOverlayTabs('scenarios');
    }

    function setManualStatus(scenarioId, status) {
      if (!window._mqaEdit?.[scenarioId]) return;
      const es = window._mqaEdit[scenarioId];

      // Sync notes before any state change
      _syncNotesFromDom(scenarioId);

      es.manual_status = status;

      if (status === 'finding' && es.findings.length === 0) {
        es.findings.push({ id: `MF${Date.now()}`, severity: 'medium', title: '', expected: '', actual: '', pipeline_ref: '', screenshots: [] });
        // Re-render to show finding form
        selectOverlayScenario(scenarioId);
        return;
      }

      // Update button classes in place (no full re-render = preserves input focus)
      const btns = document.querySelectorAll(`button[data-mqa-btn="${scenarioId}"]`);
      if (btns.length) {
        btns.forEach(btn => {
          const s = btn.getAttribute('data-status');
          btn.className = `qa-edit-btn${s === status ? ` active-${s}` : ''}`;
        });
      } else {
        // Fallback: re-render
        selectOverlayScenario(scenarioId);
      }
    }

    function _syncNotesFromDom(scenarioId) {
      // Sync only the currently displayed scenario's notes
      if (!window._mqaEdit) return;
      const sid = scenarioId || window._overlaySelectedScenario;
      if (!sid || !window._mqaEdit[sid]) return;
      const input = document.getElementById(`mqa-notes-${sid}`);
      if (input) window._mqaEdit[sid].notes = input.value;
    }

    function addFinding(scenarioId) {
      if (!window._mqaEdit?.[scenarioId]) return;
      _syncNotesFromDom(scenarioId);
      window._mqaEdit[scenarioId].findings.push({ id: `MF${Date.now()}`, severity: 'medium', title: '', expected: '', actual: '', pipeline_ref: '', screenshots: [] });
      if (window._mqaEdit[scenarioId].manual_status !== 'finding') window._mqaEdit[scenarioId].manual_status = 'finding';
      selectOverlayScenario(scenarioId);
    }

    function removeFinding(scenarioId, index) {
      if (!window._mqaEdit?.[scenarioId]) return;
      _syncNotesFromDom(scenarioId);
      window._mqaEdit[scenarioId].findings.splice(index, 1);
      if (window._mqaEdit[scenarioId].findings.length === 0 && window._mqaEdit[scenarioId].manual_status === 'finding') window._mqaEdit[scenarioId].manual_status = 'fail';
      selectOverlayScenario(scenarioId);
    }

    function removeScreenshot(scenarioId, findingIndex, screenshotIndex) {
      const finding = window._mqaEdit?.[scenarioId]?.findings?.[findingIndex];
      if (!finding?.screenshots) return;
      _syncNotesFromDom(scenarioId);
      finding.screenshots.splice(screenshotIndex, 1);
      selectOverlayScenario(scenarioId);
    }

    async function uploadFindingScreenshot(scenarioId, findingIndex, file) {
      if (!file) return;
      const finding = window._mqaEdit?.[scenarioId]?.findings?.[findingIndex];
      if (!finding) return;
      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch(`/api/qa/manual/screenshot?project=${encodeURIComponent(state.qaProject)}&finding_id=${encodeURIComponent(finding.id)}`, { method: 'POST', body: formData });
      if (resp.ok) {
        const result = await resp.json();
        finding.screenshots = finding.screenshots || [];
        finding.screenshots.push(result.filename);
        _syncNotesFromDom(scenarioId);
        selectOverlayScenario(scenarioId);
      }
    }

    async function launchSnipAndPaste(scenarioId, findingIndex) {
      try {
        await fetch('/api/qa/snip', { method: 'POST' });
        // Store context for auto-paste
        window._snipTarget = { scenarioId, findingIndex, type: 'finding' };
        _ensureUnifiedPasteHandler();
        _showToast('Snip started — press Ctrl+V to attach when done', 'info');
      } catch (e) {
        console.error('Failed to launch snipping tool:', e);
      }
    }

    async function pasteFromClipboard(scenarioId, findingIndex) {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imageType = item.types.find(t => t.startsWith('image/'));
          if (imageType) {
            const blob = await item.getType(imageType);
            await _uploadClipboardImage(scenarioId, findingIndex, blob);
            return;
          }
        }
        _showToast('No image on clipboard', 'error');
      } catch (e) {
        _showToast('Clipboard access denied — use Ctrl+V instead', 'error');
      }
    }

    async function _uploadClipboardImage(scenarioId, findingIndex, blob) {
      const finding = window._mqaEdit?.[scenarioId]?.findings?.[findingIndex];
      if (!finding) return;
      const formData = new FormData();
      formData.append('file', blob, `snip_${Date.now()}.png`);
      const resp = await fetch(`/api/qa/manual/screenshot/paste?project=${encodeURIComponent(state.qaProject)}&finding_id=${encodeURIComponent(finding.id)}`, { method: 'POST', body: formData });
      if (resp.ok) {
        const result = await resp.json();
        finding.screenshots = finding.screenshots || [];
        finding.screenshots.push(result.filename);
        _syncNotesFromDom(scenarioId);
        selectOverlayScenario(scenarioId);
        _showToast('Screenshot attached', 'success');
      }
    }

    function _showToast(message, type) {
      const toast = document.createElement('div');
      const bg = type === 'success' ? 'var(--semantic-success)' : type === 'error' ? 'var(--semantic-error)' : 'var(--accent-primary)';
      toast.style.cssText = `position:fixed;top:20px;right:20px;z-index:700;padding:10px 18px;background:${bg};color:var(--bg-base);border-radius:6px;font-size:13px;font-weight:600;box-shadow:var(--shadow-md);font-family:var(--font-base);transition:opacity 0.3s`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    async function loadRecentScreenshots(scenarioId, findingIndex) {
      const strip = document.getElementById(`recent-strip-${scenarioId}-${findingIndex}`);
      if (!strip) return;

      // Toggle visibility
      if (strip.style.display !== 'none' && strip.innerHTML) {
        strip.style.display = 'none';
        return;
      }

      strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">Loading...</span>';
      strip.style.display = 'flex';

      try {
        const resp = await fetch('/api/qa/recent-screenshots?limit=8');
        const data = await resp.json();
        if (!data.files?.length) {
          strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">No screenshots found</span>';
          return;
        }
        strip.innerHTML = data.files.map(f =>
          `<img src="/api/qa/recent-screenshots/${encodeURIComponent(f.name)}"
                title="${f.name}"
                onclick="attachRecentScreenshot('${scenarioId}',${findingIndex},'${f.name.replace(/'/g, "\\'")}')">`
        ).join('');
      } catch (e) {
        strip.innerHTML = '<span style="color:var(--semantic-error);font-size:11px">Failed to load</span>';
      }
    }

    async function attachRecentScreenshot(scenarioId, findingIndex, filename) {
      const finding = window._mqaEdit?.[scenarioId]?.findings?.[findingIndex];
      if (!finding) return;

      // Fetch the file from recent screenshots and re-upload as finding evidence
      const resp = await fetch(`/api/qa/recent-screenshots/${encodeURIComponent(filename)}`);
      if (!resp.ok) return;
      const blob = await resp.blob();
      const formData = new FormData();
      formData.append('file', blob, filename);
      const uploadResp = await fetch(`/api/qa/manual/screenshot/paste?project=${encodeURIComponent(state.qaProject)}&finding_id=${encodeURIComponent(finding.id)}`, { method: 'POST', body: formData });
      if (uploadResp.ok) {
        const result = await uploadResp.json();
        finding.screenshots = finding.screenshots || [];
        finding.screenshots.push(result.filename);
        _syncNotesFromDom(scenarioId);
        selectOverlayScenario(scenarioId);
      }
    }

    // --- Unified paste handler for snip → Ctrl+V (findings + scenarios) ---

    function _ensureUnifiedPasteHandler() {
      if (window._unifiedPasteHandler) return;
      window._unifiedPasteHandler = async (e) => {
        const target = window._snipTarget;
        if (!target) return;
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            const blob = item.getAsFile();
            if (target.type === 'scenario') {
              await _uploadScenarioClipboard(target.scenarioId, blob);
            } else {
              await _uploadClipboardImage(target.scenarioId, target.findingIndex, blob);
            }
            window._snipTarget = null;
            return;
          }
        }
      };
      document.addEventListener('paste', window._unifiedPasteHandler);
    }

    // --- Scenario-level screenshot capture (context, not findings) ---

    async function uploadScenarioScreenshot(scenarioId, file) {
      if (!file) return;
      const eventId = window._overlayEventId;
      if (!eventId) return;
      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch(`/api/qa/scenario/screenshot?project=${encodeURIComponent(state.qaProject)}&event_id=${encodeURIComponent(eventId)}&scenario_id=${encodeURIComponent(scenarioId)}`, { method: 'POST', body: formData });
      if (resp.ok) {
        const result = await resp.json();
        // Update local overlay data so re-render picks it up
        const s = window._overlayScenarios?.[scenarioId];
        if (s) {
          if (!s.manual_screenshots) s.manual_screenshots = [];
          s.manual_screenshots.push(result.filename);
        }
        selectOverlayScenario(scenarioId);
        _showToast('Screenshot attached to scenario', 'success');
      }
    }

    async function scenarioSnipAndPaste(scenarioId) {
      try {
        await fetch('/api/qa/snip', { method: 'POST' });
        window._snipTarget = { scenarioId, type: 'scenario' };
        _ensureUnifiedPasteHandler();
        _showToast('Snip started — press Ctrl+V to attach when done', 'info');
      } catch (e) {
        console.error('Failed to launch snipping tool:', e);
      }
    }

    async function scenarioPasteFromClipboard(scenarioId) {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imageType = item.types.find(t => t.startsWith('image/'));
          if (imageType) {
            const blob = await item.getType(imageType);
            await _uploadScenarioClipboard(scenarioId, blob);
            return;
          }
        }
        _showToast('No image on clipboard', 'error');
      } catch (e) {
        // Clipboard API denied — fall back to Ctrl+V
        window._snipTarget = { scenarioId, type: 'scenario' };
        _ensureUnifiedPasteHandler();
        _showToast('Clipboard blocked — press Ctrl+V instead', 'info');
      }
    }

    async function _uploadScenarioClipboard(scenarioId, blob) {
      const eventId = window._overlayEventId;
      if (!eventId) return;
      const formData = new FormData();
      formData.append('file', blob, `snip_${Date.now()}.png`);
      const resp = await fetch(`/api/qa/scenario/screenshot?project=${encodeURIComponent(state.qaProject)}&event_id=${encodeURIComponent(eventId)}&scenario_id=${encodeURIComponent(scenarioId)}`, { method: 'POST', body: formData });
      if (resp.ok) {
        const result = await resp.json();
        const s = window._overlayScenarios?.[scenarioId];
        if (s) {
          if (!s.manual_screenshots) s.manual_screenshots = [];
          s.manual_screenshots.push(result.filename);
        }
        selectOverlayScenario(scenarioId);
        _showToast('Screenshot attached to scenario', 'success');
      }
    }

    async function scenarioLoadRecent(scenarioId) {
      const strip = document.getElementById(`recent-strip-scenario-${scenarioId}`);
      if (!strip) return;
      if (strip.style.display !== 'none' && strip.innerHTML) {
        strip.style.display = 'none';
        return;
      }
      strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">Loading...</span>';
      strip.style.display = 'flex';
      try {
        const resp = await fetch('/api/qa/recent-screenshots?limit=8');
        const data = await resp.json();
        if (!data.files?.length) {
          strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">No screenshots found</span>';
          return;
        }
        strip.innerHTML = data.files.map(f =>
          `<img src="/api/qa/recent-screenshots/${encodeURIComponent(f.name)}"
                title="${f.name}"
                onclick="scenarioAttachRecent('${scenarioId}','${f.name.replace(/'/g, "\\'")}')">`
        ).join('');
      } catch (e) {
        strip.innerHTML = '<span style="color:var(--semantic-error);font-size:11px">Failed to load</span>';
      }
    }

    async function scenarioAttachRecent(scenarioId, filename) {
      const resp = await fetch(`/api/qa/recent-screenshots/${encodeURIComponent(filename)}`);
      if (!resp.ok) return;
      const blob = await resp.blob();
      await uploadScenarioScreenshot(scenarioId, blob);
    }

    async function deleteScenarioScreenshot(scenarioId, filename) {
      const eventId = window._overlayEventId;
      if (!eventId) return;
      const resp = await fetch(`/api/qa/scenario/screenshot?project=${encodeURIComponent(state.qaProject)}&event_id=${encodeURIComponent(eventId)}&scenario_id=${encodeURIComponent(scenarioId)}&filename=${encodeURIComponent(filename)}`, { method: 'DELETE' });
      if (resp.ok) {
        const s = window._overlayScenarios?.[scenarioId];
        if (s?.manual_screenshots) {
          s.manual_screenshots = s.manual_screenshots.filter(f => f !== filename);
        }
        selectOverlayScenario(scenarioId);
        _showToast('Screenshot removed', 'success');
      }
    }

    async function saveManualQa() {
      _syncNotesFromDom();
      const eventId = window._mqaEventId;
      const editState = window._mqaEdit;
      if (!eventId || !editState) return;
      const scenarios = {};
      for (const [sid, data] of Object.entries(editState)) {
        if (data.tag === 'api_only' || data.tag === 'expected_fail') continue;
        scenarios[sid] = { manual_status: data.manual_status, notes: data.notes || undefined, findings: data.findings.length > 0 ? data.findings : undefined, tested_at: data.manual_status !== 'untested' ? new Date().toISOString() : undefined };
      }
      const resp = await fetch(`/api/qa/manual?project=${encodeURIComponent(state.qaProject)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event_id: eventId, scenarios }) });
      if (resp.ok) {
        window._overlayEditMode = false;
        window._mqaEdit = null;
        // Remove snip paste listener
        if (window._unifiedPasteHandler) {
          document.removeEventListener('paste', window._unifiedPasteHandler);
          window._unifiedPasteHandler = null;
        }
        window._snipTarget = null;
        _showToast('Manual QA saved', 'success');
        await loadQaCoverage();
        renderQa();
        openEventOverlay(eventId, 'scenarios');
      }
    }

    function renderQaGallery() {
      const gallery = state.qaGallery;
      if (!gallery) return '<div style="color:var(--text-tertiary);padding:40px;text-align:center">No screenshots found. Run <code>/screengrab</code> to capture.</div>';

      const stats = gallery.stats || {};

      // Filter bar
      const expandedOnly = document.getElementById('qa-expanded-toggle')?.checked || false;
      const filterBar = `
        <div class="qa-meta-bar" style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
          <span>Captures: ${stats.captured || 0}/${stats.total || 0}${stats.variants ? ` + ${stats.variants} variants` : ''}</span>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="qa-expanded-toggle" ${expandedOnly ? 'checked' : ''} onchange="renderQa()">
            Expanded Only
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="qa-diff-toggle" onchange="renderQa()">
            Visual Diff
          </label>
          <button onclick="openGalleryUploadPanel()" style="margin-left:auto;padding:4px 12px;font-size:12px;border-radius:4px;border:1px solid var(--accent-camel);cursor:pointer;color:var(--accent-camel);background:none">&#128247; Upload Correction</button>
        </div>
      `;

      // Groups
      const groups = (gallery.groups || []).map(g => {
        const viewer = g.viewer;
        const children = g.children || [];

        const allNodes = [viewer, ...children];
        const thumbs = allNodes.map(node => {
          const hasVariants = node.variants && node.variants.length > 0;

          // If expanded-only filter is on, skip nodes without variants
          if (expandedOnly && !hasVariants) return '';

          const imgSrc = node.screenshot_url || '';
          const imgTag = node.has_screenshot
            ? `<img src="${imgSrc}" alt="${node.name}" loading="lazy">`
            : `<div class="qa-thumb-placeholder">Not captured</div>`;

          let html = expandedOnly ? '' : `
            <div class="qa-thumb ${state.qaExpandedNode === node.id ? 'expanded' : ''}" onclick="toggleGalleryNode('${node.id}')" style="position:relative">
              ${imgTag}
              ${node.has_screenshot ? `<button onclick="event.stopPropagation();expandScreengrab('${imgSrc}','${node.id}','${node.id}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:1px solid var(--border-subtle);border-radius:4px;padding:2px 6px;cursor:pointer;color:var(--text-secondary);font-size:10px" title="Enlarge + replace options">&#8599;</button>` : ''}
              <div class="qa-thumb-label">
                <span style="font-weight:500">${node.id}</span>
                <span style="color:var(--text-tertiary);font-size:11px">${node.type === 'modal' ? '(modal)' : node.type === 'sub-viewer' ? '(tab)' : ''}</span>
              </div>
            </div>
          `;

          // Add variant thumbnails
          if (hasVariants) {
            for (const v of node.variants) {
              const variantId = `${node.id}__${v.suffix}`;
              html += `
                <div class="qa-thumb qa-thumb-variant ${state.qaExpandedNode === variantId ? 'expanded' : ''}" onclick="toggleGalleryVariant('${node.id}', '${v.suffix}', '${v.screenshot_url}', '${v.previous_url || ''}')" style="position:relative">
                  <img src="${v.screenshot_url}" alt="${variantId}" loading="lazy">
                  <button onclick="event.stopPropagation();expandScreengrab('${v.screenshot_url}','${node.id}_${v.suffix}','${node.id}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:1px solid var(--border-subtle);border-radius:4px;padding:2px 6px;cursor:pointer;color:var(--text-secondary);font-size:10px" title="Enlarge + replace options">&#8599;</button>
                  <div class="qa-thumb-label">
                    <span style="font-weight:500">${node.id}_${v.suffix}</span>
                    <span style="color:var(--accent-secondary);font-size:11px">(${v.suffix})</span>
                  </div>
                </div>
              `;
            }
          }

          return html;
        }).filter(Boolean).join('');

        // Check if expanded node belongs to this group (base ID or variant ID like v_inv_skus__expanded)
        const allInGroup = [viewer, ...children];
        const expandedBase = state.qaExpandedNode?.split('__')[0];
        const expandedBelongsHere = state.qaExpandedNode && allInGroup.some(n => n.id === state.qaExpandedNode || n.id === expandedBase);
        const inlineExpand = expandedBelongsHere ? `<div id="qa-expanded-container"></div>` : '';

        return `
          <div class="qa-category-group">
            <div class="qa-category-header">${viewer.name}</div>
            <div class="qa-gallery-grid">${thumbs}</div>
            ${inlineExpand}
          </div>
        `;
      }).join('');

      // Load detail async after render + scroll into view
      if (state.qaExpandedNode) {
        setTimeout(() => {
          loadGalleryNodeDetail(state.qaExpandedNode);
          const el = document.getElementById('qa-expanded-container');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 0);
      }

      return filterBar + groups;
    }

    function openGalleryUploadPanel() {
      // Build node options from gallery data
      const gallery = state.qaGallery;
      if (!gallery?.groups) return;

      const nodes = [];
      for (const g of gallery.groups) {
        nodes.push({ id: g.viewer.id, name: g.viewer.name, type: g.viewer.type });
        for (const c of (g.children || [])) {
          nodes.push({ id: c.id, name: c.name, type: c.type });
        }
      }

      const options = nodes.map(n => {
        const typeLabel = n.type === 'sub-viewer' ? 'tab' : n.type === 'modal' ? 'modal' : '';
        return `<option value="${n.id}">${n.id} — ${n.name}${typeLabel ? ` (${typeLabel})` : ''}</option>`;
      }).join('');

      // Insert inline panel at top of gallery
      const existing = document.getElementById('qa-gallery-upload-panel');
      if (existing) { existing.remove(); return; } // toggle off

      const panel = document.createElement('div');
      panel.id = 'qa-gallery-upload-panel';
      panel.style.cssText = 'padding:12px 16px;margin-bottom:16px;border:1px solid var(--accent-camel);border-radius:6px;background:var(--bg-secondary)';
      panel.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text-secondary);font-weight:500">Replace screenshot for:</span>
          <select id="qa-upload-node-select" style="padding:4px 8px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:4px;color:var(--text-primary);font-size:12px;min-width:240px">
            ${options}
          </select>
          <label style="padding:4px 12px;font-size:12px;border-radius:4px;border:1px solid var(--accent-camel);cursor:pointer;color:var(--accent-camel);background:none;display:inline-block">
            Choose File
            <input type="file" accept="image/*" style="display:none" onchange="submitGalleryUpload(this.files[0])">
          </label>
          <span id="qa-upload-status" style="font-size:11px;color:var(--text-tertiary)"></span>
          <button onclick="document.getElementById('qa-gallery-upload-panel').remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px">&#10005;</button>
        </div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:6px">Current screenshot will be moved to _previous/ for visual diff.</div>
      `;

      const qaBody = document.querySelector('.qa-body');
      if (qaBody) qaBody.prepend(panel);
    }

    async function submitGalleryUpload(file) {
      if (!file) return;
      const nodeId = document.getElementById('qa-upload-node-select')?.value;
      if (!nodeId) return;

      const statusEl = document.getElementById('qa-upload-status');
      if (statusEl) statusEl.textContent = 'Uploading...';

      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch(
        `/api/qa/gallery/upload?project=${encodeURIComponent(state.qaProject)}&node_id=${encodeURIComponent(nodeId)}`,
        { method: 'POST', body: formData }
      );
      if (resp.ok) {
        const result = await resp.json();
        if (statusEl) {
          statusEl.style.color = 'var(--semantic-success)';
          statusEl.textContent = result.previous_saved
            ? `Uploaded ${result.filename} — previous saved to _previous/`
            : `Uploaded ${result.filename}`;
        }
        // Reload gallery after brief delay to show success message
        setTimeout(async () => {
          await loadQaGallery();
          renderQa();
        }, 1500);
      } else {
        const err = await resp.json().catch(() => ({}));
        if (statusEl) {
          statusEl.style.color = 'var(--semantic-error)';
          statusEl.textContent = `Failed: ${err.detail || 'Unknown error'}`;
        }
      }
    }

    function expandPropagation() {
      const pre = document.getElementById('qa-propagation-content');
      if (!pre) return;
      const existing = document.getElementById('qa-lightbox');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'qa-lightbox';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:24px';
      overlay.onclick = () => overlay.remove();
      overlay.innerHTML = `
        <div style="max-width:95vw;max-height:90vh;position:relative;overflow:auto" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <span style="color:var(--text-tertiary);font-size:14px;font-weight:600">Propagation Diagram</span>
          </div>
          <pre style="font-family:var(--font-mono);font-size:14px;line-height:1.6;color:var(--text-primary);background:var(--bg-surface);padding:24px;border-radius:8px;border:1px solid var(--border-default);white-space:pre;overflow-x:auto">${pre.textContent}</pre>
          <button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:-8px;right:-8px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:50%;width:28px;height:28px;color:var(--text-primary);cursor:pointer;font-size:14px">&#10005;</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function expandScreengrab(src, title, nodeId) {
      const existing = document.getElementById('qa-lightbox');
      if (existing) existing.remove();

      const resolvedNodeId = nodeId || (title || '').replace(/ expanded$/, '').trim();
      const isReplaceable = resolvedNodeId && !src.includes('/manual/screenshot/');

      // Store original src for cancel
      window._lightboxOriginalSrc = src;
      window._lightboxNodeId = resolvedNodeId;
      window._lightboxPendingBlob = null;

      const overlay = document.createElement('div');
      overlay.id = 'qa-lightbox';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:24px';
      overlay.onclick = () => { _lightboxCleanup(); overlay.remove(); };

      const svgBrowse = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
      const svgSnip = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>';
      const svgPaste = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>';
      const svgRecent = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>';

      const toolbar = isReplaceable ? `
        <label class="qa-snip-btn" title="Browse" style="cursor:pointer;background:rgba(0,0,0,0.3)">${svgBrowse}<input type="file" accept="image/*" style="display:none" onchange="lightboxStageFile(this.files[0])"></label>
        <button class="qa-snip-btn" title="Snip" style="background:rgba(0,0,0,0.3)" onclick="lightboxSnip()">${svgSnip}</button>
        <button class="qa-snip-btn" title="Paste" style="background:rgba(0,0,0,0.3)" onclick="lightboxPaste()">${svgPaste}</button>
        <button class="qa-snip-btn" title="Recent" style="background:rgba(0,0,0,0.3);border-color:var(--text-muted);color:var(--text-muted)" onclick="lightboxRecent()">${svgRecent}</button>
        <span id="qa-lightbox-status" style="font-size:11px"></span>
        <div id="qa-lightbox-confirm" style="display:none;margin-left:8px;display:none;gap:6px">
          <button class="qa-snip-btn" style="background:var(--semantic-success);color:var(--bg-base);border-color:var(--semantic-success);font-weight:600" onclick="lightboxConfirmSave()">&#10003; Save</button>
          <button class="qa-snip-btn" style="background:rgba(0,0,0,0.3)" onclick="lightboxCancelPreview()">Cancel</button>
        </div>
      ` : '';

      overlay.innerHTML = `
        <div style="max-width:90vw;max-height:90vh;position:relative" onclick="event.stopPropagation()">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <span style="color:var(--text-tertiary);font-size:12px;font-family:var(--font-mono)">${title || ''}</span>
            ${toolbar}
          </div>
          <img src="${src}" id="qa-lightbox-img" style="max-width:90vw;max-height:85vh;border-radius:8px;border:1px solid var(--border-default);box-shadow:var(--shadow-lg)">
          <div id="qa-lightbox-recent" class="qa-screenshot-strip" style="display:none;margin-top:8px"></div>
          <button onclick="_lightboxCleanup();this.parentElement.parentElement.remove()" style="position:absolute;top:-8px;right:-8px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:50%;width:28px;height:28px;color:var(--text-primary);cursor:pointer;font-size:14px">&#10005;</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function _lightboxCleanup() {
      // Revoke any object URL preview
      if (window._lightboxPreviewUrl) {
        URL.revokeObjectURL(window._lightboxPreviewUrl);
        window._lightboxPreviewUrl = null;
      }
      window._lightboxPendingBlob = null;
      if (window._lightboxPasteHandler) {
        document.removeEventListener('paste', window._lightboxPasteHandler);
        window._lightboxPasteHandler = null;
      }
    }

    function _lightboxStageBlob(blob) {
      // Preview the new image without uploading
      window._lightboxPendingBlob = blob;
      if (window._lightboxPreviewUrl) URL.revokeObjectURL(window._lightboxPreviewUrl);
      window._lightboxPreviewUrl = URL.createObjectURL(blob);

      const img = document.getElementById('qa-lightbox-img');
      if (img) {
        img.src = window._lightboxPreviewUrl;
        img.style.border = '2px solid var(--semantic-success)';
      }

      // Show Save/Cancel
      const confirmEl = document.getElementById('qa-lightbox-confirm');
      if (confirmEl) confirmEl.style.display = 'flex';

      const statusEl = document.getElementById('qa-lightbox-status');
      if (statusEl) { statusEl.style.color = 'var(--accent-primary)'; statusEl.textContent = 'Preview — click Save to confirm'; }
    }

    function lightboxStageFile(file) {
      if (file) _lightboxStageBlob(file);
    }

    function lightboxCancelPreview() {
      const img = document.getElementById('qa-lightbox-img');
      if (img) {
        img.src = window._lightboxOriginalSrc;
        img.style.border = '1px solid var(--border-default)';
      }
      if (window._lightboxPreviewUrl) {
        URL.revokeObjectURL(window._lightboxPreviewUrl);
        window._lightboxPreviewUrl = null;
      }
      window._lightboxPendingBlob = null;
      const confirmEl = document.getElementById('qa-lightbox-confirm');
      if (confirmEl) confirmEl.style.display = 'none';
      const statusEl = document.getElementById('qa-lightbox-status');
      if (statusEl) statusEl.textContent = '';
    }

    async function lightboxConfirmSave() {
      const blob = window._lightboxPendingBlob;
      const nodeId = window._lightboxNodeId;
      if (!blob || !nodeId) return;

      const statusEl = document.getElementById('qa-lightbox-status');
      if (statusEl) { statusEl.style.color = 'var(--text-tertiary)'; statusEl.textContent = 'Saving...'; }

      const formData = new FormData();
      formData.append('file', blob, `replace_${Date.now()}.png`);
      const resp = await fetch(
        `/api/qa/gallery/upload?project=${encodeURIComponent(state.qaProject)}&node_id=${encodeURIComponent(nodeId)}`,
        { method: 'POST', body: formData }
      );
      if (resp.ok) {
        _showToast('Screenshot replaced', 'success');
        if (statusEl) { statusEl.style.color = 'var(--semantic-success)'; statusEl.textContent = 'Saved'; }
        const confirmEl = document.getElementById('qa-lightbox-confirm');
        if (confirmEl) confirmEl.style.display = 'none';
        // Update original src so Cancel doesn't revert to old
        const img = document.getElementById('qa-lightbox-img');
        if (img) {
          window._lightboxOriginalSrc = img.src;
          img.style.border = '1px solid var(--border-default)';
        }
        window._lightboxPendingBlob = null;
        loadQaGallery();
      } else {
        const err = await resp.json().catch(() => ({}));
        if (statusEl) { statusEl.style.color = 'var(--semantic-error)'; statusEl.textContent = err.detail || 'Failed'; }
      }
    }

    async function lightboxSnip() {
      try {
        await fetch('/api/qa/snip', { method: 'POST' });
        if (!window._lightboxPasteHandler) {
          window._lightboxPasteHandler = async (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
              if (item.type.startsWith('image/')) {
                e.preventDefault();
                _lightboxStageBlob(item.getAsFile());
                return;
              }
            }
          };
          document.addEventListener('paste', window._lightboxPasteHandler);
        }
        _showToast('Snip started — Ctrl+V to preview', 'info');
      } catch (e) { console.error(e); }
    }

    async function lightboxPaste() {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imageType = item.types.find(t => t.startsWith('image/'));
          if (imageType) {
            _lightboxStageBlob(await item.getType(imageType));
            return;
          }
        }
        _showToast('No image on clipboard', 'error');
      } catch (e) {
        _showToast('Clipboard access denied — use Ctrl+V', 'error');
      }
    }

    async function lightboxRecent() {
      const strip = document.getElementById('qa-lightbox-recent');
      if (!strip) return;
      if (strip.style.display !== 'none' && strip.innerHTML.includes('<img')) {
        strip.style.display = 'none';
        return;
      }
      strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">Loading...</span>';
      strip.style.display = 'flex';
      try {
        const resp = await fetch('/api/qa/recent-screenshots?limit=8');
        const data = await resp.json();
        if (!data.files?.length) { strip.innerHTML = '<span style="color:var(--text-muted);font-size:11px">No screenshots</span>'; return; }
        strip.innerHTML = data.files.map(f =>
          `<img src="/api/qa/recent-screenshots/${encodeURIComponent(f.name)}" title="${f.name}" onclick="lightboxStageRecent('${f.name.replace(/'/g,"\\'")}')">`
        ).join('');
      } catch (e) { strip.innerHTML = '<span style="color:var(--semantic-error);font-size:11px">Failed</span>'; }
    }

    async function lightboxStageRecent(filename) {
      const resp = await fetch(`/api/qa/recent-screenshots/${encodeURIComponent(filename)}`);
      if (!resp.ok) return;
      _lightboxStageBlob(await resp.blob());
    }

    // Legacy compat — still called by old file input onchange
    async function replaceLightboxScreengrab(nodeId, file) {
      if (!file) return;
      _lightboxStageBlob(file);
    }

    async function toggleGalleryNode(nodeId) {
      if (state.qaExpandedNode === nodeId) {
        state.qaExpandedNode = null;
      } else {
        state.qaExpandedNode = nodeId;
      }
      state._variantOverride = null;
      renderQa();
    }

    function toggleGalleryVariant(nodeId, suffix, screenshotUrl, previousUrl) {
      const variantId = `${nodeId}__${suffix}`;
      if (state.qaExpandedNode === variantId) {
        state.qaExpandedNode = null;
        state._variantOverride = null;
      } else {
        state.qaExpandedNode = variantId;
