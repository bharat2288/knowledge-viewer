        state._variantOverride = { nodeId, suffix, screenshotUrl, previousUrl };
      }
      renderQa();
    }

    async function loadGalleryNodeDetail(expandedId) {
      const container = document.getElementById('qa-expanded-container');
      if (!container) return;

      // If this is a variant (has __suffix), load the base node but show variant screenshot
      const isVariant = expandedId.includes('__');
      const nodeId = isVariant ? expandedId.split('__')[0] : expandedId;

      try {
        const resp = await fetch(`/api/qa/gallery/${nodeId}?project=${encodeURIComponent(state.qaProject)}`);
        const data = await resp.json();
        const node = data.node;
        const showDiff = document.getElementById('qa-diff-toggle')?.checked;

        // Find screenshot URLs — use variant override if clicking a variant thumb
        let screenshotUrl = null, previousUrl = null;
        const vo = state._variantOverride;
        if (isVariant && vo) {
          screenshotUrl = vo.screenshotUrl;
          previousUrl = vo.previousUrl || null;
        } else if (state.qaGallery) {
          for (const g of state.qaGallery.groups) {
            const all = [g.viewer, ...(g.children || [])];
            const match = all.find(n => n.id === nodeId);
            if (match) {
              screenshotUrl = match.screenshot_url;
              previousUrl = match.previous_url;
              break;
            }
          }
        }

        const currentImg = screenshotUrl
          ? `<div><div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">CURRENT</div><img src="${screenshotUrl}" style="max-width:100%;border-radius:8px;border:1px solid var(--border-subtle)"></div>`
          : '<div style="color:var(--text-tertiary)">No current capture</div>';

        const previousImg = showDiff && previousUrl
          ? `<div><div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">PREVIOUS</div><img src="${previousUrl}" style="max-width:100%;border-radius:8px;border:1px solid var(--border-subtle)"></div>`
          : '';

        const edgesIn = (data.edges_in || []).map(e => e.source_name || e.source).join(', ') || 'none';
        const edgesOut = (data.edges_out || []).map(e => e.target_name || e.target).join(', ') || 'none';

        container.innerHTML = `
          <div class="qa-expanded-node">
            <div class="qa-diff-container ${showDiff && previousUrl ? 'has-diff' : ''}">
              ${currentImg}
              ${previousImg}
            </div>
            <div class="qa-node-detail">
              <div style="display:grid;grid-template-columns:repeat(3,auto);gap:16px;margin-bottom:12px">
                <div><span style="color:var(--text-tertiary)">ID:</span> <span style="color:var(--accent-camel)">${isVariant ? expandedId.replace('__', '_') : node.id}</span>${isVariant ? ' <span style="color:var(--accent-terra);font-size:11px">(variant)</span>' : ''}</div>
                <div><span style="color:var(--text-tertiary)">Type:</span> ${node.type}</div>
                <div><span style="color:var(--text-tertiary)">Parent:</span> ${node.parent || '—'}</div>
              </div>
              <div style="margin-bottom:8px"><span style="color:var(--text-tertiary)">Source:</span> ${node.source_file || '—'}</div>
              <div style="margin-bottom:8px"><span style="color:var(--text-tertiary)">Description:</span> ${node.description || '—'}</div>
              <div style="margin-bottom:4px"><span style="color:var(--text-tertiary)">Edges in (${data.edge_count?.in || 0}):</span> ${edgesIn}</div>
              <div><span style="color:var(--text-tertiary)">Edges out (${data.edge_count?.out || 0}):</span> ${edgesOut}</div>
            </div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load node detail:', e);
        if (container) container.innerHTML = '<div style="color:var(--semantic-error)">Failed to load node detail</div>';
      }
    }

    function renderQaMonitor() {
      const mon = state.qaMonitor;
      const matrix = state.qaMatrix;

      const PHASES = ['scope', 'matrix', 'helpers', 'spec', 'results'];
      const PHASE_LABELS = { scope: 'Scope', matrix: 'Matrix', helpers: 'Helpers', spec: 'Spec + Self-Check', results: 'Run + Results' };

      // Progress section
      let progressHtml = '';
      if (mon && mon.running && mon.active_event) {
        const plan = mon.active_plan || {};
        const currentPhase = plan.current_phase || 'scope';
        const phasesDone = mon.phases_done || [];
        const currentIdx = PHASES.indexOf(currentPhase);
        const pct = Math.round(((currentIdx + 1) / PHASES.length) * 100);
        const elapsed = plan.started ? Math.round((Date.now() - new Date(plan.started).getTime()) / 1000) : 0;
        const elapsedStr = `${Math.floor(elapsed / 60)}m ${elapsed % 60}s`;

        const phaseSteps = PHASES.map((p, i) => {
          const done = phasesDone.includes(p);
          const active = p === currentPhase;
          const icon = done ? '✓' : active ? '◐' : '○';
          const color = done ? 'var(--semantic-success)' : active ? 'var(--accent-camel)' : 'var(--text-muted)';
          return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;color:${color}"><span>${icon}</span> <span>${PHASE_LABELS[p]}</span></div>`;
        }).join('');

        progressHtml = `
          <div class="activity-section" style="margin-bottom:20px">
            <div class="section-header">Run Status</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <span><span style="color:var(--semantic-success)">●</span> RUNNING &nbsp; <strong>${mon.active_event}</strong> &nbsp; Phase: ${PHASE_LABELS[currentPhase] || currentPhase}</span>
              <span style="color:var(--text-tertiary)">Elapsed: ${elapsedStr}</span>
            </div>
            <div class="qa-progress-bar"><div class="qa-progress-fill qa-progress-animated" style="width:${pct}%"></div></div>
            <div style="margin-top:12px;font-family:var(--font-mono);font-size:12px">${phaseSteps}</div>
          </div>
        `;
      } else if (mon && mon.active_plan?.stale) {
        progressHtml = `
          <div class="activity-section" style="margin-bottom:20px;border-color:var(--accent-terra)">
            <div class="section-header" style="color:var(--accent-terra)">Stale Run Detected</div>
            <div style="color:var(--text-secondary)">verify-plan.json has active_event set but started over 1 hour ago. The run may have crashed.</div>
          </div>
        `;
      } else {
        // Show completed plans summary
        const completed = mon?.completed_plans || [];
        const completedHtml = completed.length > 0 ? completed.map(p => {
          const status = p.results?.status || 'unknown';
          const icon = status === 'pass' ? '✓' : '✗';
          const color = status === 'pass' ? 'var(--semantic-success)' : 'var(--semantic-error)';
          const dur = p.results?.duration_ms ? `${(p.results.duration_ms / 1000).toFixed(0)}s` : '—';
          const scenarios = p.results?.scenarios?.length || 0;
          return `<div style="color:${color};padding:2px 0">${icon} ${p.event} — ${scenarios} scenarios, ${dur}</div>`;
        }).join('') : '<div style="color:var(--text-tertiary)">No completed plans yet.</div>';

        progressHtml = `
          <div class="activity-section" style="margin-bottom:20px">
            <div class="section-header">Run Status</div>
            <div style="color:var(--text-tertiary);margin-bottom:8px">No active run. Start <code>/verify</code> to see live progress.</div>
            <div class="section-header" style="margin-top:12px">Completed Verifications</div>
            <div style="font-family:var(--font-mono);font-size:12px">${completedHtml}</div>
          </div>
        `;
      }

      // Test Matrix
      let matrixHtml = '';
      if (matrix && matrix.events && matrix.viewers) {
        const viewers = matrix.viewers || [];
        const events = matrix.events || [];
        const m = matrix.matrix || {};

        const headerCells = viewers.map(v =>
          `<th class="qa-matrix-header" title="${v.name}">${v.short}</th>`
        ).join('');

        const rows = events.map(ev => {
          const cells = viewers.map(v => {
            const cell = m[ev.id]?.[v.id];
            if (!cell) return '<td></td>';
            const cls = cell.type === 'W' ? 'marker-W' : 'marker-R';
            const title = cell.assertions?.join(', ') || cell.type;
            return `<td class="${cls}" title="${title}">●${cell.type}</td>`;
          }).join('');

          return `<tr><td class="qa-matrix-event" title="${ev.name}">${ev.short}</td>${cells}</tr>`;
        }).join('');

        matrixHtml = `
          <div class="activity-section" style="margin-bottom:20px">
            <div class="section-header">Test Matrix</div>
            <div style="overflow-x:auto">
              <table class="qa-matrix">
                <thead><tr><th></th>${headerCells}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
            <div style="margin-top:8px;font-size:11px;color:var(--text-tertiary)">
              <span class="marker-W">●W</span> = write step &nbsp;&nbsp;
              <span class="marker-R">●R</span> = read assertion &nbsp;&nbsp;
              Hover cell → assertion detail
            </div>
          </div>
        `;
      }

      // Run History
      let historyHtml = '';
      if (mon && mon.history && mon.history.length > 0) {
        const rows = mon.history.map(h => {
          const date = h.date ? new Date(h.date).toLocaleString() : '—';
          const dur = h.duration_ms ? `${Math.round(h.duration_ms / 1000)}s` : '—';
          return `<tr>
            <td>${date}</td>
            <td>${h.events_tested} events</td>
            <td style="color:var(--semantic-success)">${h.passed} pass</td>
            <td style="color:var(--semantic-error)">${h.failed} fail</td>
            <td>${dur}</td>
          </tr>`;
        }).join('');

        historyHtml = `
          <div class="activity-section">
            <div class="section-header">Run History</div>
            <table class="qa-event-table">
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      return progressHtml + matrixHtml + historyHtml;
    }

    function renderQaMonitorProgress() {
      // Lightweight poll update — just re-render monitor sub-tab
      if (state.qaSubTab === 'monitor') {
        switchQaSubTab('monitor');
      }
    }

    function renderQaFindings() {
      const data = state.qaFindings;
      if (!data || !data.findings || data.findings.length === 0) {
        return '<div style="color:var(--text-tertiary);padding:40px;text-align:center">No findings recorded. Findings come from <code>/verify</code> runs and manual reviews.</div>';
      }

      const s = data.stats;
      const statCards = `
        <div class="qa-stats-row" style="grid-template-columns:repeat(6,1fr)">
          <div class="qa-stat-card"><div class="qa-stat-label">Total</div><div class="qa-stat-value">${s.total}</div></div>
          <div class="qa-stat-card"><div class="qa-stat-label">High</div><div class="qa-stat-value" style="color:var(--semantic-error)">${s.high}</div></div>
          <div class="qa-stat-card"><div class="qa-stat-label">Medium</div><div class="qa-stat-value" style="color:var(--accent-secondary)">${s.medium}</div></div>
          <div class="qa-stat-card"><div class="qa-stat-label">Low</div><div class="qa-stat-value" style="color:var(--text-tertiary)">${s.low}</div></div>
          <div class="qa-stat-card"><div class="qa-stat-label">Auto</div><div class="qa-stat-value" style="color:var(--semantic-success)">${s.auto || 0}</div></div>
          <div class="qa-stat-card"><div class="qa-stat-label">Manual</div><div class="qa-stat-value" style="color:var(--accent-primary)">${s.manual || 0}</div></div>
        </div>
      `;

      const rows = data.findings.map(f => {
        const sevClass = f.severity === 'high' ? 'high' : f.severity === 'medium' ? 'medium' : 'low';
        const sourceBadge = f.source === 'manual'
          ? '<span class="qa-finding-source-tag qa-finding-source-manual">manual</span>'
          : '<span class="qa-finding-source-tag qa-finding-source-auto">auto</span>';
        const statusBadge = f.status === 'fixed' ? '<span style="color:var(--semantic-success);font-size:11px;margin-left:6px">FIXED</span>' :
                            f.status === 'verified' ? '<span style="color:var(--accent-primary);font-size:11px;margin-left:6px">VERIFIED</span>' : '';
        const scenarioCol = f.scenario ? `<span style="color:var(--text-muted);font-size:11px">[${f.scenario}]</span>` : '';
        return `
          <tr class="qa-finding-row" onclick="toggleFindingDetail('${f.id}')">
            <td style="font-family:var(--font-mono);font-size:11px">${f.id}</td>
            <td><span class="qa-severity ${sevClass}">${f.severity?.toUpperCase()}</span></td>
            <td>${f.title || '—'} ${sourceBadge}${statusBadge}</td>
            <td style="font-size:12px">${f.event || '—'} ${scenarioCol}</td>
            <td style="color:var(--accent-primary);font-size:12px">${f.pipeline_ref || '—'}</td>
          </tr>
          ${state.qaExpandedEvent === f.id ? `
          <tr><td colspan="5" style="padding:0">
            <div class="qa-finding-detail">
              <div style="margin-bottom:8px"><strong>${f.title}</strong> ${sourceBadge}</div>
              ${f.expected ? `<div><span style="color:var(--text-tertiary)">Expected:</span> ${f.expected}</div>` : ''}
              ${f.actual ? `<div><span style="color:var(--text-tertiary)">Actual:</span> ${f.actual}</div>` : ''}
              ${f.fix ? `<div><span style="color:var(--text-tertiary)">Fix:</span> ${f.fix}</div>` : ''}
              ${f.pipeline_ref ? `<div><span style="color:var(--text-tertiary)">Pipeline:</span> <span style="color:var(--accent-primary)">${f.pipeline_ref}</span></div>` : ''}
              ${f.scenario ? `<div><span style="color:var(--text-tertiary)">Scenario:</span> ${f.scenario}</div>` : ''}
              ${f.spec_file ? `<div><span style="color:var(--text-tertiary)">Source:</span> ${f.spec_file}</div>` : ''}
              ${f.screenshots?.length ? `
                <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
                  ${f.screenshots.map(ss => `<img src="/api/qa/manual/screenshot/${encodeURIComponent(state.qaProject)}/${encodeURIComponent(ss)}" title="${ss}" style="height:56px;border-radius:4px;border:1px solid var(--border-subtle);object-fit:cover;object-position:top;cursor:pointer" onclick="event.stopPropagation();expandScreengrab(this.src,'${ss.replace(/'/g,"\\'")}')"/>`).join('')}
                </div>
              ` : ''}
              ${f.source === 'auto' ? `
                <div style="margin-top:12px;display:flex;gap:8px">
                  <select onchange="updateFindingStatus('${f.id}', this.value)" style="background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border-default);border-radius:4px;padding:4px 8px;font-family:var(--font-base)">
                    <option value="open" ${f.status === 'open' ? 'selected' : ''}>Open</option>
                    <option value="fixed" ${f.status === 'fixed' ? 'selected' : ''}>Fixed</option>
                    <option value="verified" ${f.status === 'verified' ? 'selected' : ''}>Verified</option>
                  </select>
                </div>
              ` : ''}
            </div>
          </td></tr>
          ` : ''}
        `;
      }).join('');

      return statCards + `
        <div class="qa-table-zone">
          <div class="qa-table-zone-header">
            <span class="qa-table-zone-title">All Findings</span>
            <span class="qa-table-zone-count">${s.auto || 0} auto + ${s.manual || 0} manual</span>
          </div>
          <table class="qa-event-table">
            <thead>
              <tr>
                <th style="width:80px">ID</th>
                <th style="width:70px">Sev.</th>
                <th>Finding</th>
                <th style="width:120px">Event</th>
                <th style="width:80px">Pipeline</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function toggleFindingDetail(findingId) {
      state.qaExpandedEvent = state.qaExpandedEvent === findingId ? null : findingId;
      renderQa();
    }

    async function updateFindingStatus(findingId, status) {
      try {
        await fetch(`/api/qa/findings/${findingId}/status?project=${encodeURIComponent(state.qaProject)}&status=${status}`, { method: 'POST' });
        await loadQaFindings();
        renderQa();
      } catch (e) {
        console.error('Failed to update finding status:', e);
      }
    }

    // ===========================================
    // INIT
    // ===========================================
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => switchView(el.dataset.view));
    });

    async function init() {
      await loadStats();
      await loadProjects();
      setupQmdSearch();
      renderDashboard();
    }

    init();
  </script>

  <!-- Mode toggle (fixed bottom-right) -->
  <div class="mode-toggle-group">
    <button class="mode-toggle-btn" onclick="switchMode('dark-cool')" style="background:#0a0d14;color:#e8eaf0" id="mode-btn-dark-cool">Dark Cool</button>
    <button class="mode-toggle-btn" onclick="switchMode('neutral-vivid')" style="background:#524e4a;color:#ffffff" id="mode-btn-neutral-vivid">Neutral Vivid</button>
  </div>
  <script>
    function switchMode(mode) {
      document.documentElement.setAttribute('data-theme', mode);
      localStorage.setItem('kv-mode', mode);
      document.querySelectorAll('.mode-toggle-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('mode-btn-' + mode);
      if (btn) btn.classList.add('active');
    }
    // Restore saved mode
    (function() {
      const saved = localStorage.getItem('kv-mode') || 'dark-cool';
      switchMode(saved);
    })();
  </script>
</body>
</html>
