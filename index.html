      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 24px;
    }

    .qa-sub-tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-tertiary);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      font-family: var(--font-base);
    }

    .qa-sub-tab:hover { color: var(--text-secondary); }

    .qa-sub-tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    /* Stat cards — 5 across */
    .qa-stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .qa-stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.15s;
    }

    .qa-stat-card:hover {
      border-color: var(--border-default);
      background: var(--bg-raised);
    }

    .qa-stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .qa-stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* Manual progress bar */
    .qa-manual-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .qa-manual-bar .progress {
      flex: 1;
      max-width: 200px;
      height: 6px;
      background: var(--bg-elevated);
      border-radius: 3px;
      overflow: hidden;
    }

    .qa-manual-bar .progress-fill {
      height: 100%;
      background: var(--accent-secondary);
      border-radius: 3px;
    }

    /* Meta bar */
    .qa-meta-bar {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Toggle row: Grouping + Chain Style */
    .qa-toggle-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .qa-group-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-surface);
      border-radius: 6px;
      padding: 2px;
      width: fit-content;
      border: 1px solid var(--border-subtle);
    }

    .qa-group-btn, .qa-chain-style-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: none;
      color: var(--text-tertiary);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.1s;
      font-family: var(--font-base);
    }

    .qa-group-btn:hover, .qa-chain-style-btn:hover { color: var(--text-secondary); }

    .qa-group-btn.active, .qa-chain-style-btn.active {
      background: var(--bg-raised);
      color: var(--text-primary);
    }

    .qa-toggle-separator {
      width: 1px;
      height: 24px;
      background: var(--border-subtle);
    }

    /* Shared dots + manual status tokens */
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
    .dot-pass { background: var(--semantic-success); box-shadow: 0 0 6px rgba(52,208,88,0.4); }
    .dot-fail { background: var(--semantic-error); box-shadow: 0 0 6px rgba(244,67,54,0.4); }
    .dot-untested { background: var(--text-muted); }
    .dot-partial { background: var(--accent-secondary); }

    .ms { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
    .ms-pass { color: var(--semantic-success); }
    .ms-fail { color: var(--semantic-error); }
    .ms-finding { color: var(--accent-secondary); }
    .ms-untested { color: var(--text-muted); }

    /* Legacy compat — keep for old classes still referenced */
    .qa-ms { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }
    .qa-ms-pass { color: var(--semantic-success); }
    .qa-ms-fail { color: var(--semantic-error); }
    .qa-ms-finding { color: var(--accent-secondary); }
    .qa-ms-skip { color: var(--text-muted); }
    .qa-ms-na { color: var(--text-muted); font-weight: 400; }
    .qa-ms-untested { color: var(--text-muted); }

    /* Chain groups (shared) */
    .qa-chain-group { margin-bottom: 20px; }

    .qa-chain-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    /* Compact chain pills (horizontal) */
    .qa-chain-pills {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      padding: 8px 0;
    }

    .qa-chain-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .qa-chain-pill:hover {
      border-color: var(--accent-primary);
      background: var(--bg-raised);
    }

    .qa-chain-pill-name { font-weight: 500; color: var(--text-primary); }
    .qa-chain-pill-stat { color: var(--text-tertiary); font-size: 12px; font-variant-numeric: tabular-nums; }
    .qa-chain-arrow { color: var(--text-muted); font-size: 12px; }

    /* Stacked chain chips (vertical) */
    .qa-chain-stacked {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-start;
      padding: 4px 0;
    }

    .qa-chain-stacked-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.1s;
      min-width: 220px;
    }

    .qa-chain-stacked-chip:hover {
      border-color: var(--accent-primary);
      background: var(--bg-raised);
    }

    .qa-chain-stacked-chip-name { font-weight: 500; color: var(--text-primary); flex: 1; }

    .qa-chain-stacked-chip-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .qa-chain-stacked-arrow {
      color: var(--text-muted);
      font-size: 14px;
      padding-left: 24px;
      line-height: 1;
    }

    .qa-chains-stacked-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    /* Standalone table zone */
    .qa-table-zone {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .qa-table-zone-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .qa-table-zone-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
    }

    .qa-table-zone-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .qa-event-table {
      width: 100%;
      border-collapse: collapse;
    }

    .qa-event-table th {
      text-align: left;
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border-subtle);
    }

    .qa-event-table td {
      padding: 8px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .qa-event-table tr:last-child td { border-bottom: none; }

    .qa-event-row {
      cursor: pointer;
      transition: background 0.1s;
    }

    .qa-event-row:hover {
      background: var(--bg-raised);
    }

    /* =============================================
       OVERLAY — Split-pane (from hybrid V3)
       ============================================= */
    .qa-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      z-index: 500;
      overflow: hidden;
    }

    .qa-overlay.open { display: flex; flex-direction: column; }

    @keyframes qa-overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .qa-overlay.open { animation: qa-overlay-in 0.15s ease-out; }

    .qa-overlay-top {
      flex-shrink: 0;
      padding: 20px 24px 0;
    }

    .qa-overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 0;
    }

    .qa-overlay-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .qa-overlay-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qa-zoom-btn {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      color: var(--text-tertiary);
      transition: all 0.1s;
    }

    .qa-zoom-btn:hover, .qa-zoom-btn.active {
      color: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    .qa-overlay-close {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      margin-left: 12px;
      transition: all 0.1s;
    }

    .qa-overlay-close:hover { background: var(--bg-elevated); color: var(--text-primary); }

    /* Overlay tabs */
    .qa-overlay-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 0;
      padding: 0 24px;
    }

    .qa-overlay-tab {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-tertiary);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .qa-overlay-tab:hover { color: var(--text-secondary); }
    .qa-overlay-tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }

    /* Summary bar */
    .qa-overlay-summary {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .qa-overlay-summary strong { color: var(--text-primary); }

    .qa-overlay-summary .edit-btn {
      margin-left: auto;
      background: var(--bg-raised);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 5px 16px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .qa-overlay-summary .edit-btn:hover {
      background: var(--accent-primary);
      color: var(--bg-base);
      border-color: var(--accent-primary);
    }

    /* Split pane */
    .qa-split-pane {
      display: grid;
      grid-template-columns: 35% 65%;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Scenario list (left) */
    .qa-scenario-list {
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      padding: 12px 0;
    }

    .qa-list-group-header {
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-primary);
      margin-top: 8px;
    }

    .qa-list-group-header:first-child { margin-top: 0; }
    .qa-list-group-header.negative { color: var(--accent-secondary); }
    .qa-list-group-header.ui-checks { color: var(--text-tertiary); }

    .qa-scenario-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.1s;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .qa-scenario-list-item:hover {
      background: var(--bg-raised);
      color: var(--text-primary);
    }

    .qa-scenario-list-item.selected {
      background: var(--accent-primary-subtle);
      border-left-color: var(--accent-primary);
      color: var(--text-primary);
      font-weight: 500;
    }

    .qa-scenario-list-item.na { color: var(--text-muted); }
    .qa-scenario-list-item.na:hover { color: var(--text-tertiary); }

    .qa-list-item-icons {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      min-width: 38px;
    }

    .qa-list-item-id {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 10px;
      flex-shrink: 0;
      min-width: 22px;
    }

    .qa-list-item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Detail panel (right) */
    .qa-detail-area {
      overflow-y: auto;
      padding: 20px 24px;
    }

    .qa-detail-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .qa-detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .qa-detail-meta .tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag-pass { background: rgba(13,148,72,0.1); color: var(--semantic-success); }
    .tag-fail { background: rgba(224,36,36,0.1); color: var(--semantic-error); }
    .tag-untested { background: var(--bg-raised); color: var(--text-muted); }

    .qa-detail-section { margin-bottom: 20px; }

    .qa-detail-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .qa-detail-assertions {
      background: var(--bg-raised);
      border-radius: 6px;
      padding: 12px 16px;
      border-left: 3px solid var(--accent-primary);
    }

    .qa-detail-assertion-row {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .qa-detail-assertion-row + .qa-detail-assertion-row {
      border-top: 1px solid var(--border-subtle);
    }

    .qa-detail-assertion-row .viewer {
      color: var(--accent-primary);
      font-weight: 500;
      font-family: var(--font-mono);
      font-size: 10px;
      flex-shrink: 0;
      min-width: 120px;
      padding-top: 2px;
    }

    .qa-detail-manual {
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-left: 3px solid var(--accent-secondary);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      font-style: italic;
      line-height: 1.6;
    }

    .qa-detail-manual-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-style: normal;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .qa-detail-finding {
      padding: 12px 16px;
      background: var(--accent-secondary-subtle);
      border: 1px solid var(--accent-secondary);
      border-radius: 6px;
      font-size: 12px;
      color: var(--accent-secondary);
      font-weight: 500;
    }

    .qa-detail-finding-severity {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--accent-secondary);
      color: var(--bg-base);
      margin-right: 8px;
    }

    .qa-detail-notes {
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
      font-style: italic;
    }

    .qa-detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Text zoom — scales everything in detail area uniformly */
    .qa-overlay[data-zoom="1"] .qa-detail-area { zoom: 1; }
    .qa-overlay[data-zoom="2"] .qa-detail-area { zoom: 1.15; }
    .qa-overlay[data-zoom="3"] .qa-detail-area { zoom: 1.3; }

    /* Scope/Results tab content (reuses detail-area) */
    .qa-scope-section {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .qa-scope-section:last-child { border-bottom: none; }
    .qa-scope-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .qa-scope-text { font-size: 14px; color: var(--text-primary); line-height: 1.5; }
    .qa-scope-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .qa-scope-table td { padding: 5px 10px 5px 0; border-bottom: 1px solid var(--border-subtle); vertical-align: top; }
    .qa-scope-table .col-module { color: var(--accent-primary); white-space: nowrap; font-weight: 500; }
    .qa-scope-table .col-arrow { color: var(--text-muted); width: 20px; text-align: center; }
    .qa-scope-table .col-target { color: var(--text-secondary); }
    .qa-scope-table .col-op { color: var(--text-tertiary); font-size: 12px; font-family: var(--font-mono); }

    .qa-read-viewer { padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
    .qa-read-viewer:last-child { border-bottom: none; }
    .qa-read-viewer-name { font-size: 14px; color: var(--accent-primary); font-weight: 500; margin-bottom: 2px; }
    .qa-read-viewer-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.5; }
    .qa-viewer-thumb { height: 60px; border-radius: 4px; border: 1px solid var(--border-subtle); object-fit: cover; object-position: top; cursor: pointer; transition: all 0.15s; }
    .qa-viewer-thumb:hover { border-color: var(--accent-primary); transform: scale(1.05); }

    .qa-collapsible summary { cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); padding: 8px 0; }
    .qa-collapsible summary:hover { color: var(--text-primary); }
    .qa-propagation-pre { font-size: 12px; color: var(--text-secondary); margin: 4px 0; overflow-x: auto; max-height: 400px; overflow-y: auto; background: var(--bg-raised); padding: 12px; border-radius: 6px; line-height: 1.4; }

    /* Typography fix — force design system font on all QA interactive elements */
    .qa-overlay button, .qa-overlay input, .qa-overlay select,
    .qa-edit-btn, .qa-snip-btn, .qa-group-btn, .qa-chain-style-btn,
    .qa-sub-tab, .qa-overlay-tab {
      font-family: var(--font-base);
    }

    /* Edit mode controls */
    .qa-edit-buttons { display: flex; gap: 6px; margin: 6px 0; }
    .qa-edit-btn {
      padding: 4px 12px; font-size: 12px; border-radius: 4px;
      border: 1px solid var(--border-default); cursor: pointer;
      background: var(--bg-surface); color: var(--text-secondary);
      transition: all 0.1s; font-weight: 500;
    }
    .qa-edit-btn.active-pass { background: var(--semantic-success); color: #fff; border-color: var(--semantic-success); }
    .qa-edit-btn.active-fail { background: var(--semantic-error); color: #fff; border-color: var(--semantic-error); }
    .qa-edit-btn.active-finding { background: var(--accent-secondary); color: #fff; border-color: var(--accent-secondary); }
    .qa-edit-btn.active-skip { background: var(--text-muted); color: #fff; border-color: var(--text-muted); }
    .qa-edit-btn:hover:not([class*="active-"]) { background: var(--bg-elevated); color: var(--text-primary); }
    .qa-edit-notes {
      width: 100%; padding: 6px 10px; background: var(--bg-surface);
      border: 1px solid var(--border-default); border-radius: 4px;
      color: var(--text-primary); font-size: 13px; box-sizing: border-box; margin-top: 4px;
      font-family: var(--font-base); resize: vertical; min-height: 34px; max-height: 200px;
      line-height: 1.5;
    }
    .qa-edit-notes:focus { border-color: var(--accent-primary); outline: none; }

    /* Screenshot capture controls */
    .qa-screenshot-strip {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      overflow-x: auto;
      padding: 4px 0;
    }
    .qa-screenshot-strip img {
      height: 48px;
      border-radius: 4px;
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      object-fit: cover;
      object-position: top;
      transition: all 0.1s;
    }
    .qa-screenshot-strip img:hover {
      border-color: var(--accent-primary);
      transform: scale(1.05);
    }
    .qa-snip-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--accent-primary);
      cursor: pointer;
      color: var(--accent-primary);
      background: none;
      font-family: var(--font-base);
      font-weight: 500;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .qa-snip-btn:hover {
      background: var(--accent-primary-subtle);
    }
    .qa-finding-form {
      margin-top: 8px; padding: 10px 12px;
      border: 1px solid var(--accent-secondary); border-radius: 6px;
      background: var(--accent-secondary-subtle);
    }
    .qa-finding-form input, .qa-finding-form select {
      padding: 5px 8px; background: var(--bg-surface);
      border: 1px solid var(--border-default); border-radius: 4px;
      color: var(--text-primary); font-size: 12px;
      font-family: var(--font-base);
    }
    .qa-finding-form input:focus { border-color: var(--accent-secondary); outline: none; }

    /* Results */
    .qa-result-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; line-height: 1.4; }
    .qa-result-icon { font-weight: 600; width: 16px; text-align: center; }
    .qa-result-pass { color: var(--semantic-success); }
    .qa-result-fail { color: var(--semantic-error); }
    .qa-result-name { color: var(--text-primary); }
    .qa-result-duration { color: var(--text-muted); font-size: 12px; }

    /* Findings */
    .qa-finding-card {
      padding: 10px 12px; margin-bottom: 8px;
      border-left: 3px solid var(--accent-secondary);
      background: var(--bg-raised); border-radius: 0 6px 6px 0;
    }
    .qa-finding-card-title { font-size: 14px; color: var(--text-primary); font-weight: 500; margin-bottom: 4px; }
    .qa-finding-card-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .qa-finding-source-tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; font-weight: 500; margin-left: 6px; }
    .qa-finding-source-auto { background: rgba(122,176,122,0.15); color: var(--semantic-success); }
    .qa-finding-source-manual { background: rgba(148,132,176,0.15); color: var(--accent-secondary); }

    /* Progress bar */
    .qa-progress-bar { height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
    .qa-progress-fill { height: 100%; background: var(--accent-primary); border-radius: 3px; transition: width 0.3s ease; }
    .qa-progress-animated {
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
      background-size: 200% 100%; animation: progressPulse 2s ease infinite;
    }
    @keyframes progressPulse { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* Gallery */
    .qa-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; padding: 8px 0; }
    .qa-thumb { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.15s; }
    .qa-thumb:hover { border-color: var(--accent-primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .qa-thumb.expanded { border-color: var(--accent-primary); box-shadow: var(--shadow-glow-camel); }
    .qa-thumb img { width: 100%; height: 120px; object-fit: cover; object-position: top; }
    .qa-thumb-variant { border-color: var(--border-default); border-style: dashed; }
    .qa-thumb-placeholder { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; background: var(--bg-raised); color: var(--text-muted); font-size: 12px; }
    .qa-thumb-label { padding: 8px; display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
    .qa-expanded-node { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 10px; padding: 20px; margin-top: 16px; }
    .qa-diff-container { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
    .qa-diff-container.has-diff { grid-template-columns: 1fr 1fr; }
    .qa-node-detail { font-size: 13px; line-height: 1.6; }

    /* Test Matrix */
    .qa-matrix { width: 100%; border-collapse: collapse; font-size: 11px; font-family: var(--font-mono); }
    .qa-matrix th { padding: 4px 8px; text-align: center; color: var(--text-tertiary); font-weight: 500; border-bottom: 1px solid var(--border-subtle); white-space: nowrap; }
    .qa-matrix-header { writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); height: 80px; vertical-align: bottom; }
    .qa-matrix td { padding: 4px 8px; text-align: center; border-bottom: 1px solid var(--border-subtle); }
    .qa-matrix-event { text-align: left !important; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
    .qa-matrix .marker-W { color: var(--accent-primary); font-weight: 600; }
    .qa-matrix .marker-R { color: var(--semantic-success); font-weight: 600; }

    /* Findings sub-tab */
    .qa-finding-row { cursor: pointer; transition: background 0.1s; }
    .qa-finding-row:hover { background: var(--bg-raised); }
    .qa-severity { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px; display: inline-block; }
    .qa-severity.high { color: var(--semantic-error); background: rgba(205,100,100,0.15); }
    .qa-severity.medium { color: var(--accent-secondary); background: rgba(148,132,176,0.15); }
    .qa-severity.low { color: var(--text-tertiary); background: rgba(120,120,120,0.15); }
    .qa-finding-detail { padding: 16px 24px; background: var(--bg-raised); font-size: 13px; line-height: 1.6; }

    /* Scenario cards (legacy — used in edit mode / scope-results tab) */
    .qa-scenario-card { padding: 12px 0; border-bottom: 1px solid var(--border-subtle); }
    .qa-scenario-card:last-child { border-bottom: none; }
    .qa-scenario-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .qa-scenario-name { font-size: 14px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }
    .qa-scenario-name strong { font-weight: 700; margin-right: 4px; }
    .qa-scenario-auto { font-size: 12px; color: var(--text-muted); white-space: nowrap; margin-left: 12px; }
    .qa-scenario-assertions { padding: 6px 10px; margin: 4px 0 6px 0; background: var(--bg-raised); border-radius: 4px; font-size: 13px; line-height: 1.5; }
    .qa-scenario-assertions .viewer-name { color: var(--accent-primary); font-weight: 500; }
    .qa-scenario-assertions .checks { color: var(--text-secondary); }
    .qa-scenario-manual-note { font-size: 13px; color: var(--text-secondary); font-style: italic; border-left: 2px solid var(--accent-primary); padding: 2px 0 2px 8px; margin: 4px 0; }
    .qa-scenario-manual-finding { font-size: 13px; color: var(--accent-secondary); margin: 3px 0; }
    .qa-scenario-group-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent-primary); margin: 24px 0 8px 0; padding-bottom: 4px; border-bottom: 1px solid var(--border-subtle); }
    .qa-summary-bar { display: flex; align-items: center; gap: 16px; padding: 10px 14px; background: var(--bg-raised); border-radius: 6px; margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
    .qa-summary-bar .stat { font-weight: 600; color: var(--text-primary); }

    /* Mode toggle (fixed bottom-right) */
    .mode-toggle-group {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 600;
      display: flex;
      gap: 6px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      padding: 6px 10px;
      box-shadow: var(--shadow-md);

    .mode-toggle-btn {

      cursor: pointer;
      font-size: 12px;

    }

    .mode-toggle-btn.active {
      border-color: var(--accent-primary);
      box-shadow: 0 0 8px rgba(91,155,213,0.3);
    }
  </style>

  <script>
    // ===========================================
    // STATE
    // ===========================================
    const state = {
      view: 'dashboard',
      stats: {},
      sessions: [],
      errors: [],
      decisions: [],
      learnings: [],
      prompts: [],
      projects: [],
      projectsData: [],  // rich project objects from /api/projects
      promptProjects: [],  // distinct project values from prompts.db
      conversations: [],
      selectedConversation: null,
      tags: [],  // tag vocabulary
      docs: [],  // indexed documents
      docsTree: {},  // documents organized by category
      docsSearchResults: null,  // search results (null = show tree)
      watchedDirs: [],  // watched directories
      selectedDoc: null,  // currently viewed document
      docViewMode: 'source',  // 'source' or 'reader'
      selectedItem: null,
      searchQuery: '',
      selectedPrompts: new Set(),  // for batch review
      filters: {
        project: '',
        resolved: null,
        scored: null,
        minScore: null,
        maxScore: null,
        tag: '',  // tag filter for prompts
        source: '',  // source filter for prompts (claude|codex)
        docCategory: '',  // category filter for docs
        // Lifecycle dimension
        lifecycleActive: true,
        lifecycleDeleted: false,
        // Type dimension
        typeSubstantive: true,
        typeTrivial: false,
        typePastes: false
      },
      qaProject: '',
      qaProjects: [],
      qaSubTab: 'coverage',
      qaCoverage: null,
      qaGallery: null,
      qaMonitor: null,
      qaMatrix: null,
      qaFindings: null,
      qaExpandedEvent: null,
      qaExpandedNode: null,
      qaMonitorInterval: null,
      qaCoverageGroupBy: 'chain',
      qaChainStyle: 'stacked',
      qmdStatus: null,
      qmdRuns: [],
      qmdDocuments: [],
      qmdDocumentTotal: 0,
      qmdDocumentFilters: {
        q: '',
        collection: '',
        embedded: 'all'
      },
      qmdDocumentLimit: 20,
      qmdMonitorInterval: null,
      qmdActionInFlight: null,
      qmdDocumentSearchTimer: null
    };

    // ===========================================
    // API
    // ===========================================
    const API = {
      async fetch(endpoint) {
        const res = await fetch(`/api${endpoint}`);
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        return res.json();
      },

      async post(endpoint, data) {
        const res = await fetch(`/api${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        return res.json();
      },

      async delete(endpoint) {
        const res = await fetch(`/api${endpoint}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        return res.json();
      },

      getStats: () => API.fetch('/stats'),
      getActivity: (limit = 10) => API.fetch(`/activity?limit=${limit}`),
      getProjects: () => API.fetch('/projects'),
      getPromptProjects: () => API.fetch('/prompt-projects'),

      getSessions: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/sessions${qs ? '?' + qs : ''}`);
      },
      getSession: (id) => API.fetch(`/sessions/${id}`),

      getErrors: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/errors${qs ? '?' + qs : ''}`);
      },
      getError: (id) => API.fetch(`/errors/${id}`),

      getDecisions: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/decisions${qs ? '?' + qs : ''}`);
      },
      getDecision: (id) => API.fetch(`/decisions/${id}`),

      getLearnings: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/learnings${qs ? '?' + qs : ''}`);
      },
      getLearning: (id) => API.fetch(`/learnings/${id}`),

      getPrompts: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/prompts${qs ? '?' + qs : ''}`);
      },
      getPrompt: (id) => API.fetch(`/prompts/${id}`),
      scorePrompts: (scores) => API.post('/prompts/score', { scores }),
      deletePrompt: (id) => API.delete(`/prompts/${id}`),
      bulkDeletePrompts: (ids) => API.post('/prompts/bulk-delete', { prompt_ids: ids }),
      getPruneCandidates: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/prompts/prune-candidates${qs ? '?' + qs : ''}`);
      },
      getDeletedPrompts: (days = 30) => API.fetch(`/prompts/deleted?days=${days}`),
      suggestScores: (promptIds = null, limit = 100) => API.post('/prompts/suggest-scores', {
        prompt_ids: promptIds,
        limit: limit
      }),

      // Bulk processing
      processAllPrompts: (dryRun = false, minScore = 7) => API.post('/prompts/process-all', {
        min_score_to_keep: minScore,
        dry_run: dryRun
      }),

      // Conversations
      getConversations: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/conversations${qs ? '?' + qs : ''}`);
      },
      getConversation: (id) => API.fetch(`/conversations/${id}`),

      // QMD Search
      searchQmd: (q, collection = null, limit = 10) => {
        const params = new URLSearchParams({ q, limit });
        if (collection) params.append('collection', collection);
        return API.fetch(`/search/qmd?${params.toString()}`);
      },
      getQmdStatus: () => API.fetch('/qmd/status'),
      getQmdRuns: (limit = 20) => API.fetch(`/qmd/runs?limit=${limit}`),
      getQmdDocuments: (params = {}) => {
        const qs = new URLSearchParams();
        Object.entries(params).forEach(([key, value]) => {
          if (value !== null && value !== undefined && value !== '') {
            qs.append(key, value);
          }
        });
        return API.fetch(`/qmd/documents?${qs.toString()}`);
      },
      runQmdUpdate: async () => {
        const res = await fetch('/api/qmd/update', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data?.detail?.error || data?.detail || `API error: ${res.status}`);
        return data;
      },
      runQmdEmbed: async () => {
        const res = await fetch('/api/qmd/embed', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data?.detail?.error || data?.detail || `API error: ${res.status}`);
        return data;
      },

      // Tags
      getTags: () => API.fetch('/tags'),
      createTag: (tag) => API.post('/tags', tag),
      deleteTag: (id) => API.delete(`/tags/${id}`),
      updatePromptTags: (promptId, tags) => {
        return fetch(`/api/prompts/${promptId}/tags`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tags })
        }).then(res => res.json());
      },
      suggestTagsForPrompts: (promptIds) => API.post('/prompts/suggest-tags', { prompt_ids: promptIds }),

      // Docs
      getDocs: (params = {}) => {
        const qs = new URLSearchParams(params).toString();
        return API.fetch(`/docs${qs ? '?' + qs : ''}`);
      },
      getDoc: (id) => API.fetch(`/docs/${id}`),
      getDocBacklinks: (id) => API.fetch(`/docs/${id}/backlinks`),
      getDocLinks: (id) => API.fetch(`/docs/${id}/links`),
      searchDocs: (q, category = null) => {
        const params = new URLSearchParams({ q });
        if (category) params.append('category', category);
        return API.fetch(`/docs/search?${params.toString()}`);
      },
      reindexDocs: () => API.post('/docs/reindex', {}),
      openDocInEditor: (id) => API.post(`/docs/${id}/open`, {}),
      addDocument: (path) => API.post('/docs/add', { path }),
      // Watched directories
      browseDirectory: (directory, pattern = '**/*.md') => {
        const params = new URLSearchParams({ directory, pattern });
        return API.fetch(`/docs/browse?${params.toString()}`);
      },
      addWatch: (data) => API.post('/docs/watch', data),
      getWatches: () => API.fetch('/docs/watches'),
      removeWatch: (id) => API.delete(`/docs/watch/${id}`)
    };

    // ===========================================
    // UTILS
    // ===========================================
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatRelativeDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function normalizeSource(source) {
      const s = (source || 'claude').toLowerCase();
      return s === 'codex' ? 'codex' : 'claude';
    }

    function formatSource(source) {
      return normalizeSource(source) === 'codex' ? 'Codex' : 'Claude';
    }

    function truncate(str, len = 100) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '...' : str;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function formatPendingActions(actionsStr) {
      if (!actionsStr) return '';
      try {
        const actions = JSON.parse(actionsStr);
        if (Array.isArray(actions) && actions.length > 0) {
          return '<ul style="margin: 0; padding-left: 20px;">' +
            actions.map(a => `<li>${escapeHtml(a)}</li>`).join('') +
            '</ul>';
        }
        return escapeHtml(actionsStr);
      } catch {
        return escapeHtml(actionsStr);
      }
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (!value) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let size = value;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      const decimals = unitIndex === 0 ? 0 : 1;
      return `${size.toFixed(decimals)} ${units[unitIndex]}`;
    }

    function getQmdRunLabel(status) {
      switch (status) {
        case 'published':
        case 'succeeded':
          return 'resolved';
        case 'failed':
          return 'unresolved';
        default:
          return 'clean';
      }
    }

    function summarizeQmdRun(run) {
      if (!run) return '';
      if (run.command === 'update') {
        const collections = run.summary?.collections || [];
        const totals = collections.reduce((acc, item) => {
          acc.new += item.new || 0;
          acc.updated += item.updated || 0;
          acc.removed += item.removed || 0;
          return acc;
        }, { new: 0, updated: 0, removed: 0 });
        return `${totals.new} new · ${totals.updated} updated · ${totals.removed} removed`;
      }
      return `${run.target_host || 'bhaclaw'} · ${run.status}`;
    }

    async function loadQmdStatus() {
      try {
        state.qmdStatus = await API.getQmdStatus();
        const badge = document.getElementById('qmd-count');
        if (badge) {
          badge.textContent = state.qmdStatus?.metrics?.active_documents || 0;
        }
      } catch (err) {
        console.error('Failed to load QMD status:', err);
        state.qmdStatus = null;
      }
    }

    async function loadQmdRuns() {
      try {
        const data = await API.getQmdRuns(20);
        state.qmdRuns = data.runs || [];
      } catch (err) {
        console.error('Failed to load QMD runs:', err);
        state.qmdRuns = [];
      }
    }

    async function loadQmdDocuments() {
      try {
        const data = await API.getQmdDocuments({
          q: state.qmdDocumentFilters.q,
          collection: state.qmdDocumentFilters.collection,
          embedded: state.qmdDocumentFilters.embedded,
          limit: state.qmdDocumentLimit
        });
        state.qmdDocuments = data.documents || [];
        state.qmdDocumentTotal = data.total || 0;
      } catch (err) {
        console.error('Failed to load QMD documents:', err);
        state.qmdDocuments = [];
        state.qmdDocumentTotal = 0;
      }
    }

    async function loadQmdView() {
      await Promise.all([loadQmdStatus(), loadQmdRuns(), loadQmdDocuments()]);
    }

    function stopQmdMonitor() {
      if (state.qmdMonitorInterval) {
        clearInterval(state.qmdMonitorInterval);
        state.qmdMonitorInterval = null;
      }
    }

    function startQmdMonitor() {
      stopQmdMonitor();
      state.qmdMonitorInterval = setInterval(async () => {
        if (state.view !== 'qmd') return;
        await loadQmdView();
        renderQmd();
      }, 5000);
    }

    function renderQmdJobBlock(title, job) {
      if (!job) {
        return `
          <div class="stat-card">
            <div class="stat-label">${title}</div>
            <div class="stat-number" style="font-size: 18px;">None</div>
            <div class="activity-meta">No job</div>
          </div>
        `;
      }

      return `
        <div class="stat-card">
          <div class="stat-label">${title}</div>
          <div style="display:flex;align-items:center;gap:8px;margin:8px 0 4px;">
            <div class="stat-number" style="font-size: 18px; text-transform: capitalize;">${escapeHtml(job.command)}</div>
            <span class="status-badge ${getQmdRunLabel(job.status)}">${escapeHtml(job.status)}</span>
          </div>
          <div class="activity-meta">${escapeHtml(summarizeQmdRun(job))}</div>
          <div class="activity-meta">${formatDate(job.updated_at || job.created_at)}</div>
        </div>
      `;
    }

    function renderQmdCollectionsTable() {
      const collections = state.qmdStatus?.collections || [];
      if (collections.length === 0) {
        return '<div class="qmd-run-empty">No collections discovered.</div>';
      }

      return `
        <div class="qmd-table-wrap">
          <table class="qmd-table">
            <thead>
              <tr>
                <th>Collection</th>
                <th>Docs</th>
                <th>Latest</th>
              </tr>
            </thead>
            <tbody>
              ${collections.map(c => `
                <tr>
                  <td>
                    <div class="qmd-collection-name">${escapeHtml(c.name)}</div>
                    <div class="qmd-collection-path mono">${escapeHtml(c.path || '')}</div>
                    <div class="qmd-collection-meta">
                      <span>Pattern <span class="mono">${escapeHtml(c.pattern || '')}</span></span>
                    </div>
                  </td>
                  <td class="qmd-numeric">${c.documents || 0}</td>
                  <td class="qmd-latest">
                    <div class="qmd-latest-primary">${formatDate(c.latest_modified_at)}</div>
                    <div class="qmd-latest-secondary">${formatRelativeDate(c.latest_modified_at)}</div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderQmdRunsTable() {
      if (!state.qmdRuns || state.qmdRuns.length === 0) {
        return '<div class="qmd-run-empty">No QMD runs recorded yet.</div>';
      }

      return `
        <div class="qmd-run-feed">
          ${state.qmdRuns.map(run => `
            <article class="qmd-run-card">
              <div class="qmd-run-card-header">
                <div class="qmd-run-title">
                  <div class="qmd-run-command">${escapeHtml(run.command)}</div>
                  <div class="qmd-run-mode">${escapeHtml(run.mode || '')}</div>
                </div>
                <span class="status-badge ${getQmdRunLabel(run.status)}">${escapeHtml(run.status)}</span>
              </div>
              <div class="qmd-run-meta">
                <span><span class="qmd-run-meta-label">Requested by</span>${escapeHtml(run.requested_by || '')}</span>
                ${run.target_host ? `<span><span class="qmd-run-meta-label">Host</span>${escapeHtml(run.target_host)}</span>` : ''}
                <span><span class="qmd-run-meta-label">Started</span>${formatRelativeDate(run.started_at || run.created_at)}</span>
              </div>
              <div class="qmd-run-summary">${escapeHtml(summarizeQmdRun(run))}</div>
            </article>
          `).join('')}
        </div>
      `;
    }

    function renderQmdDocumentsTable() {
      if (!state.qmdDocuments || state.qmdDocuments.length === 0) {
        return '<div class="qmd-run-empty">No matching documents found.</div>';
      }

      return `
        <div class="qmd-table-wrap">
          <table class="qmd-table">
            <thead>
              <tr>
                <th>Document</th>
                <th>Collection</th>
                <th>Hash</th>
                <th>Embedded</th>
                <th>Modified</th>
              </tr>
            </thead>
            <tbody>
              ${state.qmdDocuments.map(doc => `
                <tr>
                  <td>
                    <div class="qmd-doc-title">${escapeHtml(doc.title || doc.path || 'Untitled')}</div>
                    <div class="qmd-doc-path mono">${escapeHtml(doc.path || '')}</div>
                    <div class="qmd-doc-meta">
                      <span>${doc.vector_chunks || 0} chunks</span>
                    </div>
                  </td>
                  <td>${escapeHtml(doc.collection || '')}</td>
                  <td class="qmd-doc-hash" title="${escapeHtml(doc.hash || '')}">${escapeHtml((doc.hash || '').slice(0, 12) || '')}</td>
                  <td>
                    <span class="status-badge ${doc.embedded ? 'resolved' : 'unresolved'}">
                      ${doc.embedded ? 'embedded' : 'pending'}
                    </span>
                  </td>
                  <td class="qmd-latest">
                    <div class="qmd-latest-primary">${formatDate(doc.modified_at)}</div>
                    <div class="qmd-latest-secondary">${formatRelativeDate(doc.modified_at)}</div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function scheduleQmdDocumentSearch(value) {
      state.qmdDocumentFilters.q = value;
      if (state.qmdDocumentSearchTimer) {
        clearTimeout(state.qmdDocumentSearchTimer);
      }
      state.qmdDocumentSearchTimer = setTimeout(async () => {
        await loadQmdDocuments();
        renderQmd();
      }, 250);
    }

    async function setQmdDocumentCollection(value) {
      state.qmdDocumentFilters.collection = value;
      await loadQmdDocuments();
      renderQmd();
    }

    async function setQmdDocumentEmbedded(value) {
      state.qmdDocumentFilters.embedded = value;
      await loadQmdDocuments();
      renderQmd();
    }

    function renderQmd() {
      const content = document.getElementById('content');
      const status = state.qmdStatus;

      if (!status) {
        content.innerHTML = '<div style="padding:24px;color:var(--text-tertiary);">Loading QMD status…</div>';
        return;
      }

      const metrics = status.metrics || {};
      const index = status.index || {};
      const jobs = status.jobs || {};
      const activeJob = jobs.active;
      const queuedJob = jobs.queued;
      const busy = !!activeJob || !!state.qmdActionInFlight;

      content.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
          <div>
            <div style="font-size:14px;color:var(--text-secondary);margin-bottom:6px;">Canonical index</div>
            <div class="mono" style="font-size:13px;color:var(--text-primary);">${escapeHtml(index.path || '')}</div>
            <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">
              ${index.exists ? `${formatBytes(index.size_bytes)} · updated ${formatDate(index.modified_at)}` : 'Index not found'}
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button onclick="triggerQmdUpdate()" ${busy ? 'disabled' : ''} style="padding:8px 14px;border-radius:8px;border:1px solid var(--border-subtle);background:var(--bg-elevated);color:var(--text-primary);cursor:pointer;">
              ${state.qmdActionInFlight === 'update' ? 'Updating…' : 'Run update'}
            </button>
            <button onclick="triggerQmdEmbed()" ${(busy || queuedJob) ? 'disabled' : ''} style="padding:8px 14px;border-radius:8px;border:1px solid var(--accent-camel);background:transparent;color:var(--accent-camel);cursor:pointer;">
              ${state.qmdActionInFlight === 'embed' ? 'Queueing…' : 'Run embed'}
            </button>
          </div>
        </div>

        <div class="stats-grid" style="margin-bottom:20px;">
          <div class="stat-card">
            <div class="stat-label">Active Docs</div>
            <div class="stat-number">${metrics.active_documents || 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Hashes</div>
            <div class="stat-number">${metrics.active_hashes || 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Hashes</div>
            <div class="stat-number">${metrics.pending_hashes || 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Vector Chunks</div>
            <div class="stat-number">${metrics.vector_chunks || 0}</div>
          </div>
          ${renderQmdJobBlock('Active Job', activeJob)}
          ${renderQmdJobBlock('Queued Job', queuedJob)}
        </div>

        <div class="qmd-section">
          <div class="qmd-section-card">
            <div class="qmd-section-header">
              <h3 class="qmd-section-title">Collections</h3>
              <div class="qmd-section-meta">${(status.collections || []).length} sources</div>
            </div>
            ${renderQmdCollectionsTable()}
          </div>
        </div>

        <div class="qmd-section">
          <div class="qmd-section-card">
            <div class="qmd-section-header">
              <h3 class="qmd-section-title">Documents</h3>
              <div class="qmd-section-meta">${state.qmdDocuments.length} shown of ${state.qmdDocumentTotal}</div>
            </div>
            <div class="qmd-doc-toolbar">
              <input
                type="text"
                class="qmd-doc-search"
                placeholder="Find a file by title or path..."
                value="${escapeHtml(state.qmdDocumentFilters.q)}"
                oninput="scheduleQmdDocumentSearch(this.value)"
              >
              <select class="filter-select" onchange="setQmdDocumentCollection(this.value)">
                <option value="">All collections</option>
                ${(status.collections || []).map(c => `
                  <option value="${escapeHtml(c.name)}" ${state.qmdDocumentFilters.collection === c.name ? 'selected' : ''}>
                    ${escapeHtml(c.name)}
                  </option>
                `).join('')}
              </select>
              <select class="filter-select" onchange="setQmdDocumentEmbedded(this.value)">
                <option value="all" ${state.qmdDocumentFilters.embedded === 'all' ? 'selected' : ''}>All states</option>
                <option value="yes" ${state.qmdDocumentFilters.embedded === 'yes' ? 'selected' : ''}>Embedded</option>
                <option value="no" ${state.qmdDocumentFilters.embedded === 'no' ? 'selected' : ''}>Pending</option>
              </select>
            </div>
            ${renderQmdDocumentsTable()}
          </div>
        </div>

        <div class="qmd-section">
          <div class="qmd-section-card">
            <div class="qmd-section-header">
              <h3 class="qmd-section-title">Recent Runs</h3>
              <div class="qmd-section-meta">${state.qmdRuns.length} shown</div>
            </div>
            ${renderQmdRunsTable()}
          </div>
        </div>
      `;
    }

    async function triggerQmdUpdate() {
      if (state.qmdActionInFlight) return;
      state.qmdActionInFlight = 'update';
      renderQmd();
      try {
        const data = await API.runQmdUpdate();
        state.qmdStatus = data.status;
        await loadQmdRuns();
        showToast('QMD update complete', 'success');
      } catch (err) {
        console.error('QMD update failed:', err);
        showToast(`QMD update failed: ${err.message || err}`, 'error');
      } finally {
        state.qmdActionInFlight = null;
        await loadQmdView();
        renderQmd();
      }
    }

    async function triggerQmdEmbed() {
      if (state.qmdActionInFlight) return;
      state.qmdActionInFlight = 'embed';
      renderQmd();
      try {
        const data = await API.runQmdEmbed();
        state.qmdStatus = data.status;
        await loadQmdRuns();
        showToast('QMD embed queued', 'success');
      } catch (err) {
        console.error('QMD embed queue failed:', err);
        showToast(`QMD embed failed: ${err.message || err}`, 'error');
      } finally {
        state.qmdActionInFlight = null;
        await loadQmdView();
        renderQmd();
      }
    }

    async function navigateToActivity(type, id) {
      // Map activity type to view name
      const viewMap = {
        'session': 'sessions',
        'error': 'errors',
        'decision': 'decisions',
        'learning': 'learnings'
      };
      const view = viewMap[type];
      if (!view) return;

      // Switch to the view
      await switchView(view);

      // Select the specific item
      setTimeout(() => {
        if (type === 'session') selectSession(id);
        else if (type === 'error') selectError(id);
        else if (type === 'decision') selectDecision(id);
        else if (type === 'learning') selectLearning(id);
      }, 100);
    }

    async function loadActivity() {
      try {
        const activity = await API.getActivity(10);
        const list = document.getElementById('activity-list');

        if (activity.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">:)</div>
              <div class="empty-title">No activity yet</div>
              <div class="empty-desc">Activity will appear here as you use the knowledge system</div>
            </div>
          `;
          return;
        }

        list.innerHTML = activity.map(item => `
          <div class="activity-item clickable" onclick="navigateToActivity('${item.type}', ${item.id})">
            <span class="activity-type ${item.type}">${item.type}</span>
            <div class="activity-content">
              <div class="activity-desc">${escapeHtml(truncate(item.description, 80))}</div>
              <div class="activity-meta">
                ${item.project || 'universal'} &bull; ${formatDate(item.timestamp)}
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load activity:', err);
      }
    }

      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="filters-bar">
          <select class="filter-select" id="project-filter">
            <option value="">All projects</option>
            ${state.projects.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>

        <div class="list-container">
          <div class="list-header">
            <span class="list-title">/ Sessions</span>
            <span class="list-count">${state.sessions.length} items</span>
          </div>
          <div class="list-items" id="list-items">
            ${renderSessionsList()}
          </div>
        </div>
      `;

      document.getElementById('project-filter').addEventListener('change', (e) => {
        state.filters.project = e.target.value;
        loadSessions();

    function renderSessionsList() {
      if (state.sessions.length === 0) {

          <div class="empty-state">

              ${s.ended_cleanly ? '<span class="status-badge clean">Clean</span>' : '<span class="status-badge abrupt">Abrupt</span>'}

            <div class="item-meta">
              <span>${formatDate(s.start_time)}</span>
              <span>${s.tool_calls || 0} tool calls</span>

          </div>
          <div class="inline-detail" id="detail-${s.id}"></div>

    async function processAllPrompts() {
      const btn = document.getElementById('process-all-btn');
      if (!btn || btn.classList.contains('btn-processing')) return;

      // First do a dry run to show what will happen
      try {
        const preview = await API.processAllPrompts(true);
        const alreadyScored = preview.to_soft_delete;
        const msg = `This will:\n` +
          `  1. Score ${preview.unscored_count} unscored prompts\n` +
          `  2. Soft-delete anything below 7${alreadyScored ? ` (${alreadyScored} already qualify)` : ''}\n` +
          `  3. Tag untagged survivors\n\n` +
          `Uses GPT-4o-mini. May take a few minutes. Continue?`;

        if (!confirm(msg)) return;
      } catch (err) {
        showToast(`Dry run failed: ${err.message}`);
        return;
      }

      // Show progress overlay
      btn.classList.add('btn-processing');
      btn.textContent = 'Processing…';

      const progress = document.createElement('div');
      progress.className = 'process-progress';
      progress.id = 'process-progress';
      progress.innerHTML = `
        <div class="process-progress-title">Processing All Prompts</div>
        <div class="process-progress-steps">
          <div class="process-step active" id="step-score">
            <span class="process-step-icon">⟳</span>
            <span>Scoring unscored prompts…</span>
          </div>
          <div class="process-step" id="step-prune">
            <span class="process-step-icon">○</span>
            <span>Pruning low scores (&lt;7)</span>
          </div>
          <div class="process-step" id="step-tag">
            <span class="process-step-icon">○</span>
            <span>Tagging untagged prompts</span>
          </div>
        </div>
      `;
      document.body.appendChild(progress);

      try {
        const result = await API.processAllPrompts(false);

        // Update progress to done
        const stepScore = document.getElementById('step-score');
        const stepPrune = document.getElementById('step-prune');
        const stepTag = document.getElementById('step-tag');

        if (stepScore) {
          stepScore.className = 'process-step done';
          stepScore.innerHTML = `<span class="process-step-icon">✓</span><span>Scored ${result.scored}/${result.unscored_count}</span>`;
        }
        if (stepPrune) {
          stepPrune.className = 'process-step done';
          stepPrune.innerHTML = `<span class="process-step-icon">✓</span><span>Pruned ${result.soft_deleted || 0}/${result.to_soft_delete}</span>`;
        }
        if (stepTag) {
          stepTag.className = 'process-step done';
          stepTag.innerHTML = `<span class="process-step-icon">✓</span><span>Tagged ${result.tagged}/${result.untagged_count}</span>`;
        }

        if (result.errors && result.errors.length > 0) {
          const errDiv = document.createElement('div');
          errDiv.style.cssText = 'margin-top: 8px; font-size: 11px; color: var(--semantic-error);';
          errDiv.textContent = `${result.errors.length} error(s) — check console`;
          progress.appendChild(errDiv);
          console.warn('Process all errors:', result.errors);
        }

        // Refresh data
        await loadStats();
        await loadPrompts();

        // Auto-dismiss progress after 3s
        setTimeout(() => {
          progress.remove();
        }, 3000);

      } catch (err) {
        const progressEl = document.getElementById('process-progress');
        if (progressEl) {
          progressEl.innerHTML = `
            <div class="process-progress-title" style="color: var(--semantic-error);">Processing Failed</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${err.message}</div>
          `;
          setTimeout(() => progressEl.remove(), 4000);
        }
      } finally {
        btn.classList.remove('btn-processing');
        btn.textContent = 'Process All';
      }
    }

    // ===========================================
    function showTagSuggestions(promptId) {
      const currentTags = state.selectedItem?.tags || [];
      const suggestionsEl = document.getElementById('tag-suggestions');
      if (!suggestionsEl) return;

      // Filter out already-applied tags
      const availableTags = state.tags.filter(t => !currentTags.includes(t.name));

      if (availableTags.length === 0) {
        suggestionsEl.innerHTML = '<div class="tag-suggestion" style="color: var(--text-muted)">No more tags available</div>';
      } else {
        suggestionsEl.innerHTML = availableTags.map(t => `
          <div class="tag-suggestion" onclick="addTagToPrompt(${promptId}, '${escapeHtml(t.name)}')">
            ${escapeHtml(t.name)}
            <span class="tag-suggestion-category">${escapeHtml(t.category || '')}</span>
          </div>
        `).join('');
      }
      suggestionsEl.classList.add('show');

      // Hide on click outside
      document.addEventListener('click', hideTagSuggestionsOnClickOutside, true);
    }

    function hideTagSuggestionsOnClickOutside(e) {
      const wrapper = document.querySelector('.tag-input-wrapper');
      if (wrapper && !wrapper.contains(e.target)) {
        const suggestionsEl = document.getElementById('tag-suggestions');
        if (suggestionsEl) suggestionsEl.classList.remove('show');
        document.removeEventListener('click', hideTagSuggestionsOnClickOutside, true);
      }
    }

    function filterTagSuggestions() {
      const input = document.getElementById('tag-input');
      const suggestionsEl = document.getElementById('tag-suggestions');
      if (!input || !suggestionsEl) return;

      const query = input.value.toLowerCase().trim();
      const currentTags = state.selectedItem?.tags || [];

      const filteredTags = state.tags.filter(t =>
        !currentTags.includes(t.name) &&
        t.name.toLowerCase().includes(query)
      );

      if (filteredTags.length === 0) {
        suggestionsEl.innerHTML = '<div class="tag-suggestion" style="color: var(--text-muted)">No matching tags</div>';
      } else {
        suggestionsEl.innerHTML = filteredTags.map(t => `
          <div class="tag-suggestion" onclick="addTagToPrompt(${state.selectedItem.id}, '${escapeHtml(t.name)}')">
            ${escapeHtml(t.name)}
            <span class="tag-suggestion-category">${escapeHtml(t.category || '')}</span>
          </div>
        `).join('');
      }
    }

    function handleTagInput(event, promptId) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const input = event.target;
        const tagName = input.value.trim().toLowerCase().replace(/\s+/g, '-');
        if (tagName) {
          addTagToPrompt(promptId, tagName);
          input.value = '';
        }
      } else if (event.key === 'Escape') {
        const suggestionsEl = document.getElementById('tag-suggestions');
        if (suggestionsEl) suggestionsEl.classList.remove('show');
      }
    }

    async function addTagToPrompt(promptId, tagName) {
      try {
        const currentTags = state.selectedItem?.tags || [];
        if (currentTags.includes(tagName)) {
          showToast('Tag already applied');
          return;
        }

        const newTags = [...currentTags, tagName];
        const result = await API.updatePromptTags(promptId, newTags);

        // Update local state
        state.selectedItem.tags = result.tags;

        // Re-render the detail view
        await selectPrompt(promptId);

        // Update list view
        await loadPrompts();

        if (result.unknown_tags && result.unknown_tags.length > 0) {
          showToast(`Tag "${tagName}" not in vocabulary`);
        } else {
          showToast(`Added tag: ${tagName}`);
        }
      } catch (err) {
        console.error('Failed to add tag:', err);
        showToast('Failed to add tag');
      }
    }

    async function removeTagFromPrompt(promptId, tagName) {
      try {
        const currentTags = state.selectedItem?.tags || [];
        const newTags = currentTags.filter(t => t !== tagName);
        const result = await API.updatePromptTags(promptId, newTags);

        // Update local state
        state.selectedItem.tags = result.tags;

        // Re-render
        await selectPrompt(promptId);
        await loadPrompts();

        showToast(`Removed tag: ${tagName}`);
      } catch (err) {
        console.error('Failed to remove tag:', err);
        showToast('Failed to remove tag');
      }
    }

    // Tag suggestion modal state
    let tagSuggestState = {
      suggestions: [],
      currentIndex: 0
    };

    async function openTagSuggestor() {
      try {
        // Get untagged prompts
        const untagged = state.prompts.filter(p => !p.tags || p.tags.length === 0).slice(0, 10);
        if (untagged.length === 0) {
          showToast('No untagged prompts to suggest for');
          return;
        }

        const promptIds = untagged.map(p => p.id);
        const result = await API.suggestTagsForPrompts(promptIds);
        tagSuggestState.suggestions = result.suggestions || [];
        tagSuggestState.currentIndex = 0;

        if (tagSuggestState.suggestions.length === 0) {
          showToast('No tag suggestions available');
          return;
        }

        showTagSuggestModal();
      } catch (err) {
        console.error('Failed to get tag suggestions:', err);
        alert('Failed to get tag suggestions. Check if OpenAI API key is configured.');
      }
    }

    function showTagSuggestModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'tag-suggest-modal';
      renderTagSuggestContent(modal);
      document.body.appendChild(modal);
    }

    function renderTagSuggestContent(modal) {
      const suggestion = tagSuggestState.suggestions[tagSuggestState.currentIndex];
      const prompt = state.prompts.find(p => p.id === suggestion.id);

      modal.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2 class="modal-title">Tag Suggestions</h2>
            <button class="detail-close" onclick="closeTagSuggestModal()">Close</button>
          </div>
          <div class="modal-content">
            <div class="modal-desc">
              Prompt ${tagSuggestState.currentIndex + 1} of ${tagSuggestState.suggestions.length}
            </div>

            <div class="detail-section" style="margin-top: 16px;">
              <div class="detail-section-title">/ Prompt Preview</div>
              <div class="field-value mono" style="max-height: 150px; overflow-y: auto;">
                ${escapeHtml(prompt?.preview || 'N/A')}
              </div>
            </div>

            <div class="detail-section" style="margin-top: 16px;">
              <div class="detail-section-title">/ Suggested Tags</div>
              <div class="item-tags" style="margin-top: 8px;">
                ${(suggestion.tags || []).map(t => `
                  <span class="tag-chip" style="cursor: pointer;" onclick="applyTagSuggestion(${suggestion.id}, '${escapeHtml(t)}')">${escapeHtml(t)}</span>
                `).join('')}
              </div>
            </div>

            <div class="actions-bar" style="margin-top: 24px;">
              <button class="btn-secondary" onclick="applyAllTagSuggestions(${suggestion.id})">Apply All</button>
              <button class="btn-secondary" onclick="skipTagSuggestion()">Skip</button>
              ${tagSuggestState.currentIndex > 0 ? '<button class="btn-secondary" onclick="prevTagSuggestion()">Previous</button>' : ''}
            </div>
          </div>
        </div>
      `;
    }

    async function applyTagSuggestion(promptId, tagName) {
      await addTagToPrompt(promptId, tagName);
    }

    async function applyAllTagSuggestions(promptId) {
      const suggestion = tagSuggestState.suggestions[tagSuggestState.currentIndex];
      for (const tagName of suggestion.tags || []) {
        await addTagToPrompt(promptId, tagName);
      }
      nextTagSuggestion();
    }

    function skipTagSuggestion() {
      nextTagSuggestion();
    }

    function nextTagSuggestion() {
      tagSuggestState.currentIndex++;
      if (tagSuggestState.currentIndex >= tagSuggestState.suggestions.length) {
        closeTagSuggestModal();
        showToast('All suggestions reviewed');
        loadPrompts();
      } else {
        const modal = document.getElementById('tag-suggest-modal');
        if (modal) renderTagSuggestContent(modal);
      }
    }

    function prevTagSuggestion() {
      if (tagSuggestState.currentIndex > 0) {
        tagSuggestState.currentIndex--;
        const modal = document.getElementById('tag-suggest-modal');
        if (modal) renderTagSuggestContent(modal);
      }
    }

    function closeTagSuggestModal() {
      const modal = document.getElementById('tag-suggest-modal');
      if (modal) modal.remove();
    }

    // ===========================================
    // TAGS VIEW
    // ===========================================
    function renderTagsView() {
      const content = document.getElementById('content');

      // Group tags by category
      const byCategory = {};
      state.tags.forEach(t => {
        const cat = t.category || 'uncategorized';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(t);
      });

      const categoryOrder = ['prompt-type', 'topic', 'priority', 'meta', 'uncategorized'];
      const sortedCategories = Object.keys(byCategory).sort((a, b) => {
        return categoryOrder.indexOf(a) - categoryOrder.indexOf(b);
      });

      content.innerHTML = `
        <div class="filters-bar">
          <button class="btn-primary" onclick="openAddTagModal()">+ Add Tag</button>
        </div>

        <div class="tags-grid">
          ${sortedCategories.map(cat => `
            <div class="tag-category-card">
              <div class="tag-category-header">
                <span class="tag-category-name">${escapeHtml(cat)}</span>
                <span class="tag-category-count">${byCategory[cat].length}</span>
              </div>
              <div class="tag-category-items">
                ${byCategory[cat].map(tag => `
                  <div class="tag-vocab-item" style="border-left: 3px solid ${tag.color || 'var(--border-subtle)'}">
                    <div class="tag-vocab-name">${escapeHtml(tag.name)}</div>
                    <div class="tag-vocab-desc">${escapeHtml(tag.description || '')}</div>
                    <div class="tag-vocab-meta">
                      <span class="tag-vocab-source">${escapeHtml(tag.source || 'seed')}</span>
                      <button class="btn-delete-small" onclick="deleteTagFromVocab(${tag.id}, '${escapeHtml(tag.name)}')" title="Delete">×</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function openAddTagModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'add-tag-modal';
      modal.innerHTML = `
        <div class="modal" style="max-width: 400px;">
          <div class="modal-header">
            <h2 class="modal-title">Add New Tag</h2>

          <div class="modal-content">

            <div class="actions-bar" style="margin-top: 16px;">

              <button class="btn-secondary" onclick="closeAddTagModal()">Cancel</button>
